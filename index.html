<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta name="theme-color" content="#020617"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="FlightDeck"/>
<title>FlightDeck -- Instructor Hub</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=JetBrains+Mono:wght@400;500&family=DM+Sans:wght@400;500;600&display=swap');
:root{
  --bg:#020617;--surface:#0f172a;--card:#1e293b;--border:#334155;
  --text:#e2e8f0;--muted:#64748b;--sky:#0ea5e9;--em:#10b981;
  --amber:#f59e0b;--rose:#f43f5e;--violet:#8b5cf6;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
button{cursor:pointer;font-family:inherit}
input,textarea,select{font-family:inherit}
#app{display:flex;flex-direction:column;height:100vh;overflow:hidden}
header{flex-shrink:0;background:rgba(2,6,23,.97);border-bottom:1px solid var(--border);backdrop-filter:blur(12px);z-index:50}
.hdr{max-width:1280px;margin:0 auto;padding:0 20px;display:flex;align-items:center;gap:8px;height:54px}
.logo{display:flex;align-items:center;gap:9px;margin-right:auto}
.logo-icon{width:28px;height:28px;background:linear-gradient(135deg,var(--sky),var(--violet));border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:14px}
.logo-name{font-family:'Syne',sans-serif;font-weight:700;font-size:16px;color:#fff}
.logo-sub{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted);border-left:1px solid var(--border);padding-left:10px}
nav{display:flex;gap:3px}
.tb{padding:5px 12px;border-radius:7px;border:1px solid transparent;background:transparent;color:var(--muted);font-size:12px;font-weight:500;transition:all .15s;white-space:nowrap}
.tb.on{border-color:var(--sky);background:rgba(14,165,233,.12);color:#38bdf8}
.tb:hover:not(.on){background:var(--card);color:var(--text)}
.pwa-btn{padding:4px 10px;border-radius:7px;border:1px solid var(--em);background:rgba(16,185,129,.12);color:#34d399;font-size:11px;display:none;cursor:pointer}
main{flex:1;overflow:hidden;max-width:1280px;width:100%;margin:0 auto;padding:16px 20px;display:flex;flex-direction:column}
.panel{display:none;flex:1;overflow:hidden;flex-direction:column}
.panel.on{display:flex}
.panes{display:flex;gap:14px;flex:1;overflow:hidden}
.sidebar{width:232px;flex-shrink:0;display:flex;flex-direction:column;gap:8px;overflow:hidden}
.slist{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:5px;padding-right:2px}
.detail{flex:1;min-width:0;overflow:hidden}
.dbox{background:rgba(15,23,42,.45);border:1px solid var(--border);border-radius:14px;padding:18px;height:100%;display:flex;flex-direction:column;overflow-y:auto}
.empty{height:100%;display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:13px;flex-direction:column;gap:8px}
.empty-icon{font-size:36px;opacity:.3}
.card{background:rgba(30,41,59,.45);border:1px solid var(--border);border-radius:11px;padding:11px;cursor:pointer;transition:all .15s}
.card:hover{border-color:#475569}
.card.sel-sky{border-color:var(--sky)!important;background:rgba(14,165,233,.08)!important}
.card.sel-em{border-color:var(--em)!important;background:rgba(16,185,129,.08)!important}
.card.sel-am{border-color:var(--amber)!important;background:rgba(245,158,11,.08)!important}
.ctitle{font-weight:600;font-size:13px;color:#fff;margin-bottom:5px;line-height:1.3}
.cmeta{display:flex;align-items:center;gap:5px;flex-wrap:wrap}
.dh{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:14px;gap:10px}
.dtitle{font-family:'Syne',sans-serif;font-weight:700;font-size:19px;color:#fff;line-height:1.2}
.dactions{display:flex;gap:5px;flex-shrink:0;flex-wrap:wrap}
.badge{font-family:'JetBrains Mono',monospace;font-size:10px;padding:2px 6px;border-radius:4px;border:1px solid;white-space:nowrap}
.b-sky{background:rgba(14,165,233,.12);color:#7dd3fc;border-color:rgba(14,165,233,.35)}
.b-em{background:rgba(16,185,129,.12);color:#6ee7b7;border-color:rgba(16,185,129,.35)}
.b-am{background:rgba(245,158,11,.12);color:#fcd34d;border-color:rgba(245,158,11,.35)}
.b-vi{background:rgba(139,92,246,.12);color:#c4b5fd;border-color:rgba(139,92,246,.35)}
.b-ro{background:rgba(244,63,94,.12);color:#fda4af;border-color:rgba(244,63,94,.35)}
.b-sl{background:rgba(100,116,139,.12);color:#94a3b8;border-color:rgba(100,116,139,.35)}
.btn{padding:6px 13px;border-radius:8px;border:none;font-size:12px;font-weight:500;transition:all .15s}
.btn-p{background:var(--sky);color:#fff}.btn-p:hover{background:#38bdf8}
.btn-g{background:transparent;border:1px solid var(--border);color:#94a3b8}.btn-g:hover{background:var(--card);color:var(--text)}
.btn-d{background:rgba(244,63,94,.12);border:1px solid rgba(244,63,94,.35);color:#fda4af}.btn-d:hover{background:rgba(244,63,94,.22)}
.btn-s{background:var(--em);color:#fff}.btn-s:hover{background:#34d399;color:#000}
.btn-full{width:100%;text-align:center;padding:8px}
.field{margin-bottom:12px}
.field label{display:block;font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:4px}
.inp{width:100%;background:var(--card);border:1px solid var(--border);border-radius:8px;padding:7px 10px;color:var(--text);font-size:13px;transition:border-color .15s;outline:none}
.inp:focus{border-color:var(--sky)}
textarea.inp{resize:vertical;min-height:65px;line-height:1.5}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.g4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:10px}
.stat-row{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.stat{background:rgba(14,165,233,.07);border:1px solid rgba(14,165,233,.2);border-radius:9px;padding:9px 14px;text-align:center;min-width:88px}
.stat-v{font-family:'Syne',sans-serif;font-size:20px;font-weight:700;color:#38bdf8}
.stat-l{font-size:10px;color:var(--muted);margin-top:1px}
.sec{margin-bottom:12px}
.sec-lbl{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin-bottom:5px}
.sec-box{background:rgba(2,6,23,.45);border:1px solid rgba(51,65,85,.5);border-radius:9px;padding:11px;font-size:13px;color:#cbd5e1;line-height:1.7;white-space:pre-wrap}
.calc-card{background:rgba(14,165,233,.05);border:1px solid rgba(14,165,233,.2);border-radius:11px;padding:14px;margin-bottom:14px}
.fuel-card{background:rgba(245,158,11,.05);border:1px solid rgba(245,158,11,.2);border-radius:11px;padding:14px;margin-bottom:14px}
.calc-title{font-family:'JetBrains Mono',monospace;font-size:10px;text-transform:uppercase;letter-spacing:.1em;margin-bottom:10px}
.calc-val{font-family:'JetBrains Mono',monospace;font-size:18px;font-weight:600;color:#38bdf8}
.calc-sub{font-size:10px;color:var(--muted);margin-top:2px}
.sdiv{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--sky);text-transform:uppercase;letter-spacing:.1em;padding:8px 0 4px;border-bottom:1px solid rgba(14,165,233,.2);margin-bottom:10px;margin-top:6px}
.cli{display:flex;align-items:center;gap:9px;padding:9px 11px;border-radius:9px;border:1px solid;transition:all .15s}
.cli.done{background:rgba(16,185,129,.07);border-color:rgba(16,185,129,.3)}
.cli.undone{background:rgba(30,41,59,.45);border-color:var(--border)}
.cli-chk{width:17px;height:17px;border-radius:4px;border:2px solid;flex-shrink:0;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s}
.cli-chk.on{background:var(--em);border-color:var(--em)}
.cli-chk.off{border-color:var(--muted)}.cli-chk.off:hover{border-color:var(--em)}
.cli-num{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted);min-width:17px}
.cli-text{flex:1;font-size:13px}.cli-text.done{text-decoration:line-through;color:var(--muted)}
.cli-del{opacity:0;font-size:11px;color:var(--muted);transition:opacity .15s;padding:2px 5px;border-radius:4px;border:none;background:none;cursor:pointer}
.cli:hover .cli-del{opacity:1}.cli-del:hover{color:var(--rose)}
.prog{height:3px;background:var(--border);border-radius:2px;margin-top:7px;overflow:hidden}
.prog-fill{height:100%;background:var(--em);border-radius:2px;transition:width .3s}
.fbar{display:flex;gap:4px;flex-wrap:wrap}
.fchip{font-family:'JetBrains Mono',monospace;font-size:10px;padding:3px 7px;border-radius:4px;border:1px solid var(--border);background:var(--card);color:var(--muted);cursor:pointer;transition:all .15s}
.fchip.on{background:var(--sky);border-color:var(--sky);color:#fff}
.fchip:hover:not(.on){color:var(--text)}
.overlay{position:fixed;inset:0;background:rgba(2,6,23,.9);backdrop-filter:blur(8px);z-index:100;display:flex;align-items:center;justify-content:center;padding:14px}
.mbox{background:var(--surface);border:1px solid var(--border);border-radius:16px;width:100%;max-width:600px;max-height:92vh;display:flex;flex-direction:column;box-shadow:0 30px 60px rgba(0,0,0,.7)}
.mbox.wide{max-width:760px}
.mhead{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid var(--border);flex-shrink:0}
.mtitle{font-family:'Syne',sans-serif;font-weight:700;color:#fff;font-size:15px}
.mclose{background:none;border:none;color:var(--muted);font-size:20px;line-height:1;padding:2px 6px;cursor:pointer}.mclose:hover{color:#fff}
.mbody{padding:18px;overflow-y:auto;flex:1}
.mfoot{padding:10px 18px;border-top:1px solid var(--border);display:flex;gap:7px;flex-shrink:0}
.toast{position:fixed;bottom:20px;right:20px;background:var(--card);border:1px solid var(--em);border-radius:9px;padding:9px 14px;font-size:12px;color:#6ee7b7;z-index:300;transform:translateY(80px);opacity:0;transition:all .3s;pointer-events:none}
.toast.show{transform:translateY(0);opacity:1}
@media(max-width:640px){
  .panes{flex-direction:column}.sidebar{width:100%;max-height:200px}
  .logo-sub{display:none}.g2,.g3,.g4{grid-template-columns:1fr}
}
</style>
</head>
<body>
<div id="app">
<header>
  <div class="hdr">
    <div class="logo">
      <div class="logo-icon">&#9992;</div>
      <span class="logo-name">FlightDeck</span>
      <span class="logo-sub">Instructor Hub</span>
    </div>
    <nav id="nav">
      <button class="tb on" data-tab="flights">&#9992; Flight Log</button>
      <button class="tb" data-tab="checklists">&#10003; Checklists</button>
      <button class="tb" data-tab="lessons">&#128218; Lessons</button>
      <button class="tb" data-tab="references">&#128203; References</button>
    </nav>
    <button class="btn btn-g" id="settings-btn" style="font-size:11px;padding:4px 10px;flex-shrink:0">&#9881; Settings</button>
    <button class="pwa-btn" id="install-btn">&#8595; Install</button>
  </div>
</header>
<main>
  <div class="panel on" id="tab-flights">
    <div class="stat-row" id="fl-stats"></div>
    <div class="panes">
      <div class="sidebar">
        <input class="inp" id="fl-search" placeholder="Search flights..." style="font-size:12px"/>
        <div class="fbar" id="fl-filter"></div>
        <div class="slist" id="fl-list"></div>
        <button class="btn btn-p btn-full" id="fl-new">+ Log Flight</button>
        <button class="btn btn-g btn-full" id="fl-export-all">&#8595; Export All (.csv)</button>
      </div>
      <div class="detail" id="fl-detail">
        <div class="empty"><div class="empty-icon">&#9992;</div><span>Select a flight or log a new one</span></div>
      </div>
    </div>
  </div>
  <div class="panel" id="tab-checklists">
    <div class="panes">
      <div class="sidebar">
        <div class="fbar" id="cl-filter"></div>
        <div class="slist" id="cl-list"></div>
        <button class="btn btn-p btn-full" id="cl-new">+ New Checklist</button>
      </div>
      <div class="detail" id="cl-detail">
        <div class="empty"><div class="empty-icon">&#10003;</div><span>Select a checklist</span></div>
      </div>
    </div>
  </div>
  <div class="panel" id="tab-lessons">
    <div class="panes">
      <div class="sidebar">
        <div class="fbar" id="ls-filter"></div>
        <div class="slist" id="ls-list"></div>
        <button class="btn btn-p btn-full" id="ls-new">+ New Lesson Plan</button>
      </div>
      <div class="detail" id="ls-detail">
        <div class="empty"><div class="empty-icon">&#128218;</div><span>Select a lesson</span></div>
      </div>
    </div>
  </div>
  <div class="panel" id="tab-references">
    <div class="panes">
      <div class="sidebar">
        <input class="inp" id="rf-search" placeholder="Search..." style="font-size:12px"/>
        <div class="fbar" id="rf-filter"></div>
        <div class="slist" id="rf-list"></div>
        <button class="btn btn-p btn-full" id="rf-new">+ New Reference</button>
      </div>
      <div class="detail" id="rf-detail">
        <div class="empty"><div class="empty-icon">&#128203;</div><span>Select a reference</span></div>
      </div>
    </div>
  </div>
</main>
</div>
<div id="modal-root"></div>
<div class="toast" id="toast"></div>

<script>
// ============================================================
// UTILITIES
// ============================================================
var uid = function(){ return Math.random().toString(36).slice(2,9); };
var qs  = function(s,c){ return (c||document).querySelector(s); };

function save(k,v){ try{ localStorage.setItem(k,JSON.stringify(v)); }catch(e){} }
function load(k,d){ try{ var r=localStorage.getItem(k); return r?JSON.parse(r):d; }catch(e){ return d; } }

function toast(msg){
  var t=qs('#toast');
  t.textContent=msg;
  t.classList.add('show');
  setTimeout(function(){ t.classList.remove('show'); },2500);
}

function dlFile(name,text,mime){
  var a=document.createElement('a');
  a.href='data:'+(mime||'text/plain')+';charset=utf-8,'+encodeURIComponent(text);
  a.download=name;
  a.click();
}

function el(tag,cls,html){
  var e=document.createElement(tag);
  if(cls) e.className=cls;
  if(html) e.innerHTML=html;
  return e;
}

// ============================================================
// TIME HELPERS
// ============================================================
// "HH:MM" -> decimal hours, null if invalid
function parseUTC(s){
  if(!s) return null;
  var m=s.match(/^(\d{1,2}):(\d{2})$/);
  if(!m) return null;
  var h=parseInt(m[1]), mn=parseInt(m[2]);
  if(h>23||mn>59) return null;
  return h + mn/60;
}

// decimal difference, wraps midnight
function timeDiff(s,e){
  if(s===null||e===null) return null;
  var d=e-s;
  if(d<0) d+=24;
  return d;
}

// decimal -> "H:MM"
function decToHM(d){
  if(d===null||d===undefined||isNaN(d)) return '--';
  var h=Math.floor(d), m=Math.round((d-h)*60);
  return h+':'+(m<10?'0':'')+m;
}

// decimal -> 2dp string
function dec2(v){
  if(v===null||v===undefined||isNaN(v)) return '--';
  return parseFloat(v).toFixed(2);
}

// tacho/hobbs end - start
function instrDiff(s,e){
  var sv=parseFloat(s), ev=parseFloat(e);
  if(isNaN(sv)||isNaN(ev)) return null;
  var d=ev-sv;
  return d>=0 ? d : null;
}

// ============================================================
// SETTINGS
// ============================================================
var SETTINGS_KEY='fd_settings';
var settings=load(SETTINGS_KEY,{defaultBurnRate:'8.0'});

function saveSettings(){ save(SETTINGS_KEY,settings); }

// ============================================================
// FUEL CALCULATOR (all USG)
// ============================================================
function fuelCalc(fuelDep, fuelAdded, fuelShutdown, burnRateStr, airHrs){
  var burn = parseFloat(burnRateStr||settings.defaultBurnRate);
  var dep  = parseFloat(fuelDep);
  var added= parseFloat(fuelAdded)||0;
  var shut = parseFloat(fuelShutdown);

  var totalAvail = !isNaN(dep) ? dep+added : null;

  // fuel used: prefer actual readings, fall back to burn * airtime
  var used = null;
  if(totalAvail!==null && !isNaN(shut)){
    used = totalAvail - shut;
  } else if(airHrs!==null && !isNaN(burn)){
    used = airHrs * burn;
  }

  // remaining: prefer actual shutdown reading
  var remaining = null;
  if(!isNaN(shut)){
    remaining = shut;
  } else if(totalAvail!==null && used!==null){
    remaining = totalAvail - used;
  }

  var endurance = (remaining!==null && !isNaN(burn) && burn>0) ? remaining/burn : null;

  return {
    burn:      isNaN(burn)?null:burn,
    totalAvail: totalAvail,
    used:       used,
    remaining:  remaining,
    endurance:  endurance
  };
}

// ============================================================
// FLIGHT CALCULATIONS (times)
// ============================================================
function flCalc(f){
  return {
    block: timeDiff(parseUTC(f.chocksOff), parseUTC(f.chocksOn)),
    air:   timeDiff(parseUTC(f.takeoff),   parseUTC(f.landing)),
    tacho: instrDiff(f.tachoStart, f.tachoEnd),
    hobbs: instrDiff(f.hobbsStart, f.hobbsEnd)
  };
}

// ============================================================
// MODAL ENGINE
// ============================================================
function openModal(cfg){
  var root=qs('#modal-root');
  root.innerHTML='';
  var ov=el('div','overlay');
  var box=el('div', cfg.wide ? 'mbox wide' : 'mbox');
  var mh=el('div','mhead');
  mh.innerHTML='<span class="mtitle">'+cfg.title+'</span><button class="mclose">&times;</button>';
  var mb=el('div','mbody');
  if(typeof cfg.body==='string') mb.innerHTML=cfg.body;
  else mb.appendChild(cfg.body);
  var mf=el('div','mfoot');
  if(cfg.onSave){
    var sb=el('button','btn btn-p', cfg.saveLabel||'Save');
    sb.addEventListener('click',function(){ if(cfg.onSave()!==false) closeModal(); });
    mf.appendChild(sb);
  }
  var cb=el('button','btn btn-g','Cancel');
  cb.addEventListener('click', closeModal);
  mf.appendChild(cb);
  box.appendChild(mh);
  box.appendChild(mb);
  box.appendChild(mf);
  ov.appendChild(box);
  root.appendChild(ov);
  ov.addEventListener('click',function(e){ if(e.target===ov) closeModal(); });
  qs('.mclose',box).addEventListener('click', closeModal);
  setTimeout(function(){ var f=qs('input,textarea',mb); if(f) f.focus(); },50);
}
function closeModal(){ qs('#modal-root').innerHTML=''; }

// ============================================================
// SETTINGS MODAL
// ============================================================
qs('#settings-btn').addEventListener('click', function(){
  var div=document.createElement('div');
  div.innerHTML=
    '<div class="field">'+
      '<label>Default Fuel Burn Rate (USG/hr)</label>'+
      '<input class="inp" id="s-burn" type="number" step="0.1" value="'+settings.defaultBurnRate+'" placeholder="8.0"/>'+
      '<div style="font-size:11px;color:var(--muted);margin-top:4px">Applied to all flights unless overridden per flight</div>'+
    '</div>'+
    '<div style="background:rgba(14,165,233,.05);border:1px solid rgba(14,165,233,.2);border-radius:9px;padding:12px;margin-top:4px">'+
      '<div style="font-family:JetBrains Mono,monospace;font-size:10px;color:#7dd3fc;margin-bottom:6px">EXAMPLE</div>'+
      '<div id="s-eg" style="font-size:12px;color:#cbd5e1;line-height:1.9"></div>'+
    '</div>';
  function updateEg(){
    var r=parseFloat(qs('#s-burn',div).value);
    var eg=qs('#s-eg',div);
    if(isNaN(r)||r<=0){ eg.textContent='Enter a valid burn rate'; return; }
    eg.innerHTML=
      'At '+r+' USG/hr:<br>'+
      '1:00 hr flight uses '+dec2(r)+' USG<br>'+
      '40 USG total = '+decToHM(40/r)+' endurance<br>'+
      '10 USG remaining = '+decToHM(10/r)+' endurance';
  }
  qs('#s-burn',div).addEventListener('input', updateEg);
  setTimeout(updateEg,0);
  openModal({title:'Settings',body:div,saveLabel:'Save',onSave:function(){
    var r=parseFloat(qs('#s-burn',div).value);
    if(isNaN(r)||r<=0){ toast('Enter a valid burn rate'); return false; }
    settings.defaultBurnRate=String(r);
    saveSettings();
    toast('Settings saved');
  }});
});

// ============================================================
// TABS
// ============================================================
document.querySelectorAll('.tb').forEach(function(b){
  b.addEventListener('click',function(){
    document.querySelectorAll('.tb').forEach(function(x){ x.classList.remove('on'); });
    document.querySelectorAll('.panel').forEach(function(x){ x.classList.remove('on'); });
    b.classList.add('on');
    qs('#tab-'+b.dataset.tab).classList.add('on');
  });
});

// ============================================================
// FLIGHT LOG
// ============================================================
var FL_KEY='fd_flights_v3';
var FL_CATS=['Solo','Dual','Check Ride','Navigation','Night','Instrument','Other'];
var flights=load(FL_KEY,[]);
var flActive=null;

function flSave(){ save(FL_KEY,flights); }

function renderFlStats(){
  var totTacho=0, totHobbs=0, totAir=0, totBlock=0;
  flights.forEach(function(f){
    var c=flCalc(f);
    totTacho += instrDiff(f.tachoStart,f.tachoEnd)||0;
    totHobbs += instrDiff(f.hobbsStart,f.hobbsEnd)||0;
    totAir   += c.air||0;
    totBlock += c.block||0;
  });
  qs('#fl-stats').innerHTML=
    '<div class="stat"><div class="stat-v">'+flights.length+'</div><div class="stat-l">Flights</div></div>'+
    '<div class="stat"><div class="stat-v">'+dec2(totTacho)+'</div><div class="stat-l">Tacho Hrs</div></div>'+
    '<div class="stat"><div class="stat-v">'+dec2(totHobbs)+'</div><div class="stat-l">Hobbs Hrs</div></div>'+
    '<div class="stat"><div class="stat-v">'+decToHM(totAir)+'</div><div class="stat-l">Air Time</div></div>'+
    '<div class="stat"><div class="stat-v">'+decToHM(totBlock)+'</div><div class="stat-l">Block Time</div></div>';
}

function renderFlList(){
  var search=(qs('#fl-search').value||'').toLowerCase();
  var filt=qs('#fl-filter .fchip.on');
  var filtVal=filt?filt.textContent:'All';
  var vis=flights.filter(function(f){
    var ok=(filtVal==='All'||f.category===filtVal);
    if(search) ok=ok&&(
      (f.date||'').includes(search)||
      (f.aircraft||'').toLowerCase().includes(search)||
      (f.student||'').toLowerCase().includes(search)||
      (f.departure||'').toLowerCase().includes(search)||
      (f.destination||'').toLowerCase().includes(search)
    );
    return ok;
  }).sort(function(a,b){ return (b.date||'').localeCompare(a.date||''); });

  var list=qs('#fl-list');
  list.innerHTML='';
  if(!vis.length){
    list.innerHTML='<p style="color:var(--muted);font-size:12px;text-align:center;padding:12px">No flights found</p>';
    return;
  }
  vis.forEach(function(f){
    var c=flCalc(f);
    var card=el('div','card'+(flActive===f.id?' sel-sky':''));
    var badges='';
    if(c.tacho!==null) badges+='<span class="badge b-am">T:'+dec2(c.tacho)+'</span>';
    if(c.hobbs!==null) badges+='<span class="badge b-vi">H:'+dec2(c.hobbs)+'</span>';
    if(c.air!==null)   badges+='<span class="badge b-em">Air:'+decToHM(c.air)+'</span>';
    card.innerHTML=
      '<div class="ctitle">'+(f.date||'No date')+' &middot; '+(f.aircraft||'?')+'</div>'+
      '<div class="cmeta">'+
        '<span class="badge b-sky">'+(f.departure||'?')+'&#8594;'+(f.destination||'?')+'</span>'+
        (f.student?'<span class="badge b-sl">'+f.student+'</span>':'')+
      '</div>'+
      (badges?'<div style="display:flex;gap:5px;flex-wrap:wrap;margin-top:5px">'+badges+'</div>':'');
    card.addEventListener('click',function(){ flActive=f.id; renderFlList(); renderFlDetail(); });
    list.appendChild(card);
  });
}

    '</div>'+

    '<div class="sdiv">Block &amp; Air Times (HH:MM UTC)</div>'+
    '<div class="g4">'+
      '<div class="field"><label>Chocks Off</label><input class="inp" id="m-chocksOff" placeholder="08:30" value="'+(f.chocksOff||'')+'" maxlength="5"/></div>'+
      '<div class="field"><label>Takeoff</label><input class="inp" id="m-takeoff" placeholder="08:36" value="'+(f.takeoff||'')+'" maxlength="5"/></div>'+
      '<div class="field"><label>Landing</label><input class="inp" id="m-landing" placeholder="09:48" value="'+(f.landing||'')+'" maxlength="5"/></div>'+
      '<div class="field"><label>Chocks On</label><input class="inp" id="m-chocksOn" placeholder="09:54" value="'+(f.chocksOn||'')+'" maxlength="5"/></div>'+
    '</div>'+
    '<div class="g2" style="background:rgba(14,165,233,.05);border:1px solid rgba(14,165,233,.2);border-radius:9px;padding:12px;margin-bottom:10px">'+
      '<div><div class="sec-lbl">Block Time (auto)</div>'+
        '<span class="calc-val" id="m-block-v" style="font-size:16px">--</span> '+
        '<span id="m-block-d" style="font-size:11px;color:var(--muted)"></span></div>'+
      '<div><div class="sec-lbl">Air Time (auto)</div>'+
        '<span class="calc-val" id="m-air-v" style="font-size:16px">--</span> '+
        '<span id="m-air-d" style="font-size:11px;color:var(--muted)"></span></div>'+

    '<div class="g4">'+

    '<div class="g2" style="background:rgba(14,165,233,.05);border:1px solid rgba(14,165,233,.2);border-radius:9px;padding:12px;margin-bottom:10px">'+

      '<div class="field"><label>Added Before Flight</label><input class="inp" id="m-fuelAdded" type="number" step="0.1" placeholder="0" value="'+(f.fuelAdded||'')+'"/></div>'+
      '<div class="field"><label>At Shutdown</label><input class="inp" id="m-fuelShutdown" type="number" step="0.1" placeholder="32.0" value="'+(f.fuelShutdown||'')+'"/></div>'+
      '<div class="field"><label>Burn Rate (USG/hr)</label>'+
        '<input class="inp" id="m-burnRate" type="number" step="0.1" placeholder="Default: '+settings.defaultBurnRate+'" value="'+(f.burnRate||'')+'"/>'+

          '<span id="m-fused" style="font-family:JetBrains Mono,monospace;font-size:15px;font-weight:600;color:#fda4af">--</span>'+
          '<span style="font-size:10px;color:var(--muted)"> USG</span></div>'+
        '<div><div class="sec-lbl">Remaining</div>'+
          '<span id="m-frem" style="font-family:JetBrains Mono,monospace;font-size:15px;font-weight:600;color:#6ee7b7">--</span>'+
          '<span style="font-size:10px;color:var(--muted)"> USG</span></div>'+
        '<div><div class="sec-lbl">Endurance</div>'+

    '<div class="field"><label>Instructor Notes</label><textarea class="inp" id="m-notes" rows="3">'+(f.notes||'')+'</textarea></div>';

  // Auto-colon for UTC time fields
  ['m-chocksOff','m-chocksOn','m-takeoff','m-landing'].forEach(function(id){
    qs('#'+id,div).addEventListener('input',function(e){
      var v=e.target.value.replace(/\D/g,'');
      if(v.length>4) v=v.slice(0,4);
      if(v.length>=3) v=v.slice(0,2)+':'+v.slice(2);
      e.target.value=v;
      liveCalc();
    });
  });

  // All numeric fields trigger recalc
  ['m-tachoStart','m-tachoEnd','m-hobbsStart','m-hobbsEnd',
   'm-fuelDep','m-fuelAdded','m-fuelShutdown','m-burnRate'].forEach(function(id){
    qs('#'+id,div).addEventListener('input', liveCalc);
  });

  function liveCalc(){
    var g=function(id){ return qs('#'+id,div).value; };

    // Times
    var block=timeDiff(parseUTC(g('m-chocksOff')), parseUTC(g('m-chocksOn')));
    var air  =timeDiff(parseUTC(g('m-takeoff')),   parseUTC(g('m-landing')));
    var tacho=instrDiff(g('m-tachoStart'), g('m-tachoEnd'));
    var hobbs=instrDiff(g('m-hobbsStart'), g('m-hobbsEnd'));

    qs('#m-block-v',div).textContent=decToHM(block);
    qs('#m-block-d',div).textContent=block!==null?'('+dec2(block)+' hrs)':'';
    qs('#m-air-v',div).textContent=decToHM(air);
    qs('#m-air-d',div).textContent=air!==null?'('+dec2(air)+' hrs)':'';
    qs('#m-tacho-v',div).textContent=dec2(tacho);
    qs('#m-hobbs-v',div).textContent=dec2(hobbs);

    // Fuel
    var br=g('m-burnRate')||settings.defaultBurnRate;
    var fc=fuelCalc(g('m-fuelDep'), g('m-fuelAdded'), g('m-fuelShutdown'), br, air);
    qs('#m-ftotal',div).textContent=fc.totalAvail!==null?dec2(fc.totalAvail):'--';
    qs('#m-fused', div).textContent=fc.used!==null?dec2(fc.used):'--';
    qs('#m-frem',  div).textContent=fc.remaining!==null?dec2(fc.remaining):'--';
    qs('#m-fend',  div).textContent=fc.endurance!==null?decToHM(fc.endurance):'--';
  }

  if(ex) setTimeout(liveCalc,0);

  openModal({title: ex?'Edit Flight Record':'Log New Flight', body:div, wide:true,
    saveLabel: ex?'Save Changes':'Log Flight',
    onSave: function(){
      var g=function(id){ return qs('#'+id,div).value.trim(); };
      f.date=g('m-date'); f.aircraft=g('m-aircraft'); f.category=g('m-cat');
      f.departure=g('m-dep').toUpperCase(); f.destination=g('m-dest').toUpperCase();
      f.pic=g('m-pic'); f.student=g('m-student');
      f.chocksOff=g('m-chocksOff'); f.takeoff=g('m-takeoff');
      f.landing=g('m-landing'); f.chocksOn=g('m-chocksOn');
      f.tachoStart=g('m-tachoStart'); f.tachoEnd=g('m-tachoEnd');
      f.hobbsStart=g('m-hobbsStart'); f.hobbsEnd=g('m-hobbsEnd');
      f.fuelDep=g('m-fuelDep'); f.fuelAdded=g('m-fuelAdded');
      f.fuelShutdown=g('m-fuelShutdown'); f.burnRate=g('m-burnRate');
      f.oil=g('m-oil');
      f.maneuvers=qs('#m-maneuvers',div).value;
      f.notes=qs('#m-notes',div).value;
      if(!ex) flights.push(f);
      else{
        var i=flights.findIndex(function(x){ return x.id===f.id; });
        if(i>=0) flights[i]=f;
      }
      flSave(); flActive=f.id;
      renderFlList(); renderFlDetail(); renderFlStats();
      toast((ex?'Flight updated':'Flight logged')+' -- opening Mail...');
      setTimeout(function(){ emailFlight(f); },600);
    }
  });
}

function emailFlight(f){
  var c=flCalc(f);
  var fc=fuelCalc(f.fuelDep, f.fuelAdded, f.fuelShutdown, f.burnRate||settings.defaultBurnRate, c.air);
  var subj=encodeURIComponent('Flight Record -- '+( f.date||'?')+' - '+(f.aircraft||'?')+' - '+(f.departure||'?')+' to '+(f.destination||'?'));
  var lines=[
    'FLIGHT RECORD',
    '=============',
    'Date:        '+(f.date||'--'),
    'Aircraft:    '+(f.aircraft||'--'),
    'Category:    '+(f.category||'--'),
    'Route:       '+(f.departure||'?')+' to '+(f.destination||'?'),
    'PIC:         '+(f.pic||'--'),
    'Student:     '+(f.student||'--'),
    '',
    'TIMES (UTC)',

function exportAllFlights(){
  if(!flights.length){ toast('No flights to export'); return; }
  var hdr='Date,Aircraft,Category,Departure,Destination,PIC,Student,ChocksOff,Takeoff,Landing,ChocksOn,BlockHM,BlockHrs,AirHM,AirHrs,TachoStart,TachoEnd,TachoHrs,HobbsStart,HobbsEnd,HobbsHrs,FuelDep,FuelAdded,FuelTotal,FuelShutdown,FuelUsed,FuelRemain,BurnRate,Endurance,Oil,Maneuvers,Notes';
  var rows=flights.map(function(f){
    var c=flCalc(f);
    var fc=fuelCalc(f.fuelDep,f.fuelAdded,f.fuelShutdown,f.burnRate||settings.defaultBurnRate,c.air);
    return [
      f.date,f.aircraft,f.category,f.departure,f.destination,f.pic,f.student,
      f.chocksOff,f.takeoff,f.landing,f.chocksOn,
      decToHM(c.block),dec2(c.block),decToHM(c.air),dec2(c.air),
      f.tachoStart,f.tachoEnd,dec2(c.tacho),

      f.fuelDep,f.fuelAdded,dec2(fc.totalAvail),f.fuelShutdown,dec2(fc.used),dec2(fc.remaining),
      fc.burn,dec2(fc.endurance),
      f.oil,
      '"'+(f.maneuvers||'').replace(/"/g,'""')+'"',
      '"'+(f.notes||'').replace(/"/g,'""')+'"'
    ].join(',');
  });

      cl.items=cl.items.map(function(x){ return x.id===it.id?Object.assign({},x,{done:!x.done}):x; });

    row.querySelector('.cli-del').addEventListener('click',function(e){
      e.stopPropagation();

  qs('#cl-add-inp',ar).addEventListener('keydown',function(e){ if(e.key==='Enter') ar.querySelector('.btn').click(); });
  box.appendChild(ar); el2.appendChild(box);

    cl.items=cl.items.map(function(x){ return Object.assign({},x,{done:false}); });
    clSave(); renderClList(); renderClDetail();
  });

      cl.items.map(function(it,i){ return '  '+('0'+(i+1)).slice(-2)+'. [ ] '+it.text; }));
    dlFile(cl.title.replace(/\s+/g,'_')+'.txt',lines.join('\n')); toast('Exported');

    if(confirm('Delete this checklist?')){
      checklists=checklists.filter(function(x){ return x.id!==cl.id; });
      clSave(); clActive=null; renderClList(); renderClDetail(); toast('Deleted');

  });

      '<div><div class="dtitle">'+rf.title+'</div>'+
      '<div class="cmeta" style="margin-top:5px"><span class="badge '+(rcol[rf.category]||'b-sl')+'">'+rf.category+'</span></div></div>'+
      '<div class="dactions">'+
        '<button class="btn btn-g" id="rf-edit">Edit</button>'+
        '<button class="btn btn-g" id="rf-exp">&#8595; Export</button>'+
        '<button class="btn btn-d" id="rf-del">Delete</button>'+
      '</div>'+
    '</div>'+
    '<div class="sec-box" style="flex:1;min-height:80px">'+rf.content+'</div>';
  el2.appendChild(box);
  qs('#rf-edit',box).addEventListener('click',function(){ openRfModal(rf); });
  qs('#rf-del',box).addEventListener('click',function(){
    if(confirm('Delete?')){
      refs=refs.filter(function(x){ return x.id!==rf.id; });
      rfSave(); rfActive=null; renderRfList(); renderRfDetail(); toast('Deleted');
    }
  });
  qs('#rf-exp',box).addEventListener('click',function(){
    dlFile(rf.title.replace(/\s+/g,'_')+'_ref.txt',['REFERENCE: '+rf.title,'Category: '+rf.category,'',rf.content].join('\n'));
    toast('Exported');
  });
}

function openRfModal(ex){
  var rf=ex||{id:uid(),title:'',category:'Regulations',content:''};
  var div=document.createElement('div');
  div.innerHTML=
    '<div class="field"><label>Title</label><input class="inp" id="m-rft" value="'+(rf.title||'')+'" placeholder="Reference title"/></div>'+
    '<div class="field"><label>Category</label><select class="inp" id="m-rfc">'+
      RF_CATS.map(function(c){ return '<option'+(c===rf.category?' selected':'')+'>'+c+'</option>'; }).join('')+'</select></div>'+
    '<div class="field"><label>Content</label><textarea class="inp" id="m-rfc2" rows="10">'+(rf.content||'')+'</textarea></div>';
  openModal({title:ex?'Edit Reference':'New Reference',body:div,wide:true,saveLabel:ex?'Save':'Create',onSave:function(){
    rf.title=qs('#m-rft',div).value.trim(); if(!rf.title) return false;
    rf.category=qs('#m-rfc',div).value; rf.content=qs('#m-rfc2',div).value;
    if(!ex) refs.push(rf);
    else{ var i=refs.findIndex(function(x){ return x.id===rf.id; }); if(i>=0) refs[i]=rf; }
    rfSave(); rfActive=rf.id; renderRfList(); renderRfDetail(); toast(ex?'Updated':'Created');
  }});
}
qs('#rf-new').addEventListener('click',function(){ openRfModal(null); });
qs('#rf-search').addEventListener('input', renderRfList);

var SW_CODE=[
  "var C='fd-sw-v2';",
  "self.addEventListener('install',function(e){",
  "  e.waitUntil(caches.open(C).then(function(c){ return c.addAll([self.location.pathname]); }).then(function(){ return self.skipWaiting(); }));",
  "});",
  "self.addEventListener('activate',function(e){",
  "  e.waitUntil(caches.keys().then(function(ks){",
  "    return Promise.all(ks.filter(function(k){ return k!==C; }).map(function(k){ return caches.delete(k); }));",
  "  }).then(function(){ return self.clients.claim(); }));",
  "});",
  "self.addEventListener('fetch',function(e){",
  "  if(e.request.method!=='GET') return;",
  "  e.respondWith(caches.match(e.request).then(function(r){",
  "    return r||fetch(e.request).then(function(res){",
  "      if(res.ok){ var cl=res.clone(); caches.open(C).then(function(c){ c.put(e.request,cl); }); }",
  "      return res;",
  "    }).catch(function(){ return caches.match(self.location.pathname); });",
  "  }));",
  "});"
].join('\n');

if('serviceWorker' in navigator){
  try{
    var swBlob=new Blob([SW_CODE],{type:'application/javascript'});
    var swURL=URL.createObjectURL(swBlob);
    navigator.serviceWorker.register(swURL);
  }catch(e){}
}

var deferredPrompt=null;
window.addEventListener('beforeinstallprompt',function(e){
  e.preventDefault(); deferredPrompt=e;
  qs('#install-btn').style.display='block';
});
qs('#install-btn').addEventListener('click',function(){
  if(!deferredPrompt) return;
  deferredPrompt.prompt();
  deferredPrompt.userChoice.then(function(r){
    if(r.outcome==='accepted') toast('App installed!');
