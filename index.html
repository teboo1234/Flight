<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-title" content="FlightDeck"/>
<title>FlightDeck v26</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=B612:wght@400;700&family=B612+Mono:wght@400;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f0f4f8;--sur:#fff;--card:#e8edf2;--bdr:#c8d4e0;
  --txt:#1a2332;--mut:#5a6a7a;--sky:#0077cc;--em:#0a8a4a;
  --amb:#cc7700;--ros:#cc2244;--vio:#6644aa;
}
html,body{height:100%;background:var(--bg);color:var(--txt);font-family:'B612',sans-serif;font-size:16px}
button{cursor:pointer;font-family:inherit}
input,textarea,select{font-family:inherit;font-size:15px}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:var(--bdr);border-radius:2px}

/* Layout */
#app{display:flex;flex-direction:column;height:100vh;overflow:hidden}
header{flex-shrink:0;background:rgba(240,244,248,.97);border-bottom:1px solid var(--bdr);box-shadow:0 1px 3px rgba(0,0,0,.07)}
.hdr{max-width:1200px;margin:0 auto;padding:0 14px;display:flex;align-items:center;gap:6px;height:50px}
.logo{font-family:'B612',sans-serif;font-weight:700;font-size:16px;color:var(--sky);margin-right:auto}
nav{display:flex;gap:2px;overflow-x:auto}
.tb{padding:5px 10px;border-radius:6px;border:1px solid transparent;background:transparent;color:var(--mut);font-size:12px;white-space:nowrap;transition:all .15s}
.tb.on{border-color:var(--sky);background:rgba(0,119,204,.1);color:var(--sky);font-weight:700}
.tb:hover:not(.on){background:var(--card)}
main{flex:1;overflow:hidden;max-width:1200px;width:100%;margin:0 auto;padding:12px 14px;display:flex;flex-direction:column}
.panel{display:none;flex:1;overflow:hidden;flex-direction:column}
.panel.on{display:flex}
.panes{display:flex;gap:10px;flex:1;overflow:hidden}
.sidebar{width:210px;flex-shrink:0;display:flex;flex-direction:column;gap:6px;overflow:hidden}
.slist{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:4px}
.detail{flex:1;min-width:0;overflow:hidden}

/* Cards */
.card{background:var(--sur);border:1px solid var(--bdr);border-radius:9px;padding:10px;cursor:pointer;transition:border-color .15s}
.card:hover{border-color:var(--sky)}
.card.sel{border-color:var(--sky);background:rgba(0,119,204,.05)}
.ctitle{font-weight:700;font-size:13px;color:var(--txt);margin-bottom:4px}
.cmeta{display:flex;gap:4px;flex-wrap:wrap;align-items:center}

/* Detail box */
.dbox{background:var(--sur);border:1px solid var(--bdr);border-radius:12px;padding:14px;height:100%;display:flex;flex-direction:column;overflow-y:auto;gap:10px}
.empty{height:100%;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:8px;color:var(--mut);font-size:13px}
.empty-icon{font-size:32px;opacity:.3}

/* Badges */
.badge{font-family:'B612 Mono',monospace;font-size:10px;padding:2px 6px;border-radius:4px;border:1px solid}
.b-sky{background:rgba(0,119,204,.1);color:var(--sky);border-color:rgba(0,119,204,.3)}
.b-em{background:rgba(10,138,74,.1);color:var(--em);border-color:rgba(10,138,74,.3)}
.b-am{background:rgba(204,119,0,.1);color:var(--amb);border-color:rgba(204,119,0,.3)}
.b-vi{background:rgba(102,68,170,.1);color:var(--vio);border-color:rgba(102,68,170,.3)}
.b-ro{background:rgba(204,34,68,.1);color:var(--ros);border-color:rgba(204,34,68,.3)}
.b-sl{background:rgba(90,106,122,.1);color:var(--mut);border-color:rgba(90,106,122,.3)}

/* Buttons */
.btn{padding:6px 12px;border-radius:7px;border:none;font-size:13px;font-family:'B612',sans-serif;cursor:pointer;transition:all .15s}
.btn-p{background:var(--sky);color:#fff}.btn-p:hover{opacity:.85}
.btn-s{background:var(--em);color:#fff}.btn-s:hover{opacity:.85}
.btn-g{background:transparent;border:1px solid var(--bdr);color:var(--mut)}.btn-g:hover{background:var(--card);color:var(--txt)}
.btn-d{background:rgba(204,34,68,.1);border:1px solid rgba(204,34,68,.3);color:var(--ros)}.btn-d:hover{background:rgba(204,34,68,.2)}
.btn-full{width:100%;text-align:center;padding:8px}

/* Forms */
.field{margin-bottom:10px}
.field label{display:block;font-family:'B612 Mono',monospace;font-size:10px;color:var(--mut);text-transform:uppercase;letter-spacing:.08em;margin-bottom:4px}
.inp{width:100%;background:var(--card);border:1px solid var(--bdr);border-radius:7px;padding:7px 10px;color:var(--txt);outline:none;transition:border-color .15s}
.inp:focus{border-color:var(--sky)}
textarea.inp{resize:vertical;line-height:1.5}
.sdiv{font-family:'B612 Mono',monospace;font-size:10px;color:var(--sky);text-transform:uppercase;letter-spacing:.1em;padding:6px 0 4px;border-bottom:1px solid rgba(0,119,204,.2);margin-bottom:8px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.g4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:10px}

/* Stats */
.stat-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px}
.stat{background:rgba(0,119,204,.07);border:1px solid rgba(0,119,204,.2);border-radius:8px;padding:7px 11px;text-align:center;min-width:75px}
.stat-v{font-family:'B612 Mono',monospace;font-size:17px;font-weight:700;color:var(--sky)}
.stat-l{font-size:10px;color:var(--mut);margin-top:1px}

/* Section boxes */
.sec-lbl{font-family:'B612 Mono',monospace;font-size:10px;color:var(--mut);text-transform:uppercase;letter-spacing:.08em;margin-bottom:3px}
.sec-box{background:var(--card);border:1px solid var(--bdr);border-radius:7px;padding:8px 10px;font-size:13px;color:var(--txt);line-height:1.6;white-space:pre-wrap}

/* Calc cards */
.cc{border-radius:9px;padding:11px;margin-bottom:8px}
.cc-blue{background:rgba(0,119,204,.05);border:1px solid rgba(0,119,204,.2)}
.cc-amber{background:rgba(204,119,0,.05);border:1px solid rgba(204,119,0,.2)}
.cc-purple{background:rgba(102,68,170,.06);border:1px solid rgba(102,68,170,.2)}
.cc-title{font-family:'B612 Mono',monospace;font-size:10px;text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px;color:var(--mut)}
.cv{font-family:'B612 Mono',monospace;font-size:16px;font-weight:700;color:var(--sky)}

/* Checklist items */
.cli{display:flex;align-items:center;gap:7px;padding:7px 9px;border-radius:7px;border:1px solid var(--bdr);background:var(--sur);transition:all .15s}
.cli.done{background:rgba(10,138,74,.05);border-color:rgba(10,138,74,.3)}
.cli-chk{width:16px;height:16px;border-radius:4px;border:2px solid var(--bdr);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;transition:all .15s}
.cli-chk.on{background:var(--em);border-color:var(--em)}
.cli-num{font-family:'B612 Mono',monospace;font-size:10px;color:var(--mut);min-width:18px}
.cli-text{flex:1;font-size:13px}.cli-text.done{text-decoration:line-through;color:var(--mut)}
.cli-del{opacity:0;background:none;border:none;color:var(--mut);cursor:pointer;padding:2px 5px;font-size:13px}
.cli:hover .cli-del{opacity:1}
.prog{height:3px;background:var(--bdr);border-radius:2px;margin-top:5px;overflow:hidden}
.prog-fill{height:100%;background:var(--em);transition:width .3s}

/* Filter chips */
.fbar{display:flex;gap:3px;flex-wrap:wrap}
.fchip{font-family:'B612 Mono',monospace;font-size:10px;padding:3px 7px;border-radius:4px;border:1px solid var(--bdr);background:var(--sur);color:var(--mut);cursor:pointer;transition:all .15s}
.fchip.on{background:var(--sky);border-color:var(--sky);color:#fff}

/* Modal */
.overlay{position:fixed;inset:0;background:rgba(26,35,50,.6);backdrop-filter:blur(6px);z-index:100;display:flex;align-items:center;justify-content:center;padding:10px}
.mbox{background:var(--sur);border:1px solid var(--bdr);border-radius:14px;width:100%;max-width:820px;max-height:93vh;display:flex;flex-direction:column;box-shadow:0 20px 50px rgba(0,0,0,.2)}
.mhead{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid var(--bdr);flex-shrink:0}
.mtitle{font-weight:700;font-size:15px;color:var(--txt)}
.mclose{background:none;border:none;font-size:20px;color:var(--mut);cursor:pointer;line-height:1;padding:2px 6px}
.mtabs{display:flex;border-bottom:1px solid var(--bdr);flex-shrink:0;padding:0 16px;overflow-x:auto;gap:0}
.mtab{padding:9px 13px;font-size:12px;color:var(--mut);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;background:none;border-top:none;border-left:none;border-right:none;white-space:nowrap;transition:all .15s}
.mtab.on{color:var(--sky);border-bottom-color:var(--sky);font-weight:700}
.mpanel{display:none;padding:14px 16px;overflow-y:auto;flex:1}
.mpanel.on{display:block}
.mfoot{padding:10px 16px;border-top:1px solid var(--bdr);display:flex;gap:6px;flex-shrink:0}

/* Fuel pair */
.fpair{display:flex;gap:6px;align-items:center}
.fpair-wrap{position:relative;flex:1}
.fpair-wrap input{padding-right:34px}
.fpair-unit{position:absolute;right:8px;top:50%;transform:translateY(-50%);font-size:10px;color:var(--mut);pointer-events:none;font-family:'B612 Mono',monospace}

/* Toast */
.toast{position:fixed;bottom:16px;right:16px;background:var(--sur);border:1px solid var(--em);border-radius:8px;padding:8px 14px;font-size:12px;color:var(--em);z-index:300;transform:translateY(60px);opacity:0;transition:all .25s;pointer-events:none}
.toast.show{transform:translateY(0);opacity:1}

/* Wind result cells */
.wval{font-family:'B612 Mono',monospace;font-size:15px;font-weight:700}

@media(max-width:600px){
  .panes{flex-direction:column}.sidebar{width:100%;max-height:180px}
  .g2,.g3,.g4{grid-template-columns:1fr 1fr}
}
</style>
</head>
<body>
<div id="app">
<header>
  <div class="hdr">
    <div class="logo">&#9992; FlightDeck</div>
    <nav id="nav">
      <button class="tb on" data-tab="flights">Flights</button>
      <button class="tb" data-tab="checklists">Checklists</button>
      <button class="tb" data-tab="lessons">Lessons</button>
      <button class="tb" data-tab="references">References</button>
    </nav>
    <button class="btn btn-g" id="settings-btn" style="font-size:11px;padding:4px 9px">&#9881;</button>
  </div>
</header>
<main>

  <!-- FLIGHTS -->
  <div class="panel on" id="tab-flights">
    <div class="stat-row" id="fl-stats"></div>
    <div class="panes">
      <div class="sidebar">
        <input class="inp" id="fl-search" placeholder="Search..." style="font-size:12px"/>
        <div class="fbar" id="fl-filter"></div>
        <div class="slist" id="fl-list"></div>
        <button class="btn btn-p btn-full" id="fl-new">+ New Flight</button>
        <button class="btn btn-g btn-full" id="fl-csv">&#8595; Export CSV</button>
      </div>
      <div class="detail" id="fl-detail">
        <div class="empty"><div class="empty-icon">&#9992;</div><span>Select or log a flight</span></div>
      </div>
    </div>
  </div>

  <!-- CHECKLISTS -->
  <div class="panel" id="tab-checklists">
    <div class="panes">
      <div class="sidebar">
        <div class="fbar" id="cl-filter"></div>
        <div class="slist" id="cl-list"></div>
        <button class="btn btn-p btn-full" id="cl-new">+ New Checklist</button>
      </div>
      <div class="detail" id="cl-detail">
        <div class="empty"><div class="empty-icon">&#10003;</div><span>Select a checklist</span></div>
      </div>
    </div>
  </div>

  <!-- LESSONS -->
  <div class="panel" id="tab-lessons">
    <div class="panes">
      <div class="sidebar">
        <div class="fbar" id="ls-filter"></div>
        <div class="slist" id="ls-list"></div>
        <button class="btn btn-p btn-full" id="ls-new">+ New Lesson</button>
      </div>
      <div class="detail" id="ls-detail">
        <div class="empty"><div class="empty-icon">&#128218;</div><span>Select a lesson</span></div>
      </div>
    </div>
  </div>

  <!-- REFERENCES -->
  <div class="panel" id="tab-references">
    <div class="panes">
      <div class="sidebar">
        <input class="inp" id="rf-search" placeholder="Search..." style="font-size:12px"/>
        <div class="fbar" id="rf-filter"></div>
        <div class="slist" id="rf-list"></div>
        <button class="btn btn-p btn-full" id="rf-new">+ New Reference</button>
      </div>
      <div class="detail" id="rf-detail">
        <div class="empty"><div class="empty-icon">&#128203;</div><span>Select a reference</span></div>
      </div>
    </div>
  </div>

</main>
</div>
<div id="modal-root"></div>
<div class="toast" id="toast"></div>

// ── UTILS ─────────────────────────────────────────────────────────────────
var USG_L = 3.785;
function uid(){ return Math.random().toString(36).slice(2,9); }
function qs(s,c){ return (c||document).querySelector(s); }
function save(k,v){ try{localStorage.setItem(k,JSON.stringify(v));}catch(e){} }
function load(k,d){ try{var r=localStorage.getItem(k);return r?JSON.parse(r):d;}catch(e){return d;} }
function toast(m){ var t=qs('#toast');t.textContent=m;t.classList.add('show');setTimeout(function(){t.classList.remove('show');},2500); }
function mkEl(tag,cls,html){ var e=document.createElement(tag);if(cls)e.className=cls;if(html)e.innerHTML=html;return e; }
function setText(id,v,ctx){ var e=qs('#'+id,ctx||document);if(e)e.textContent=v; }
function dl(name,text,mime){ var a=document.createElement('a');a.href='data:'+(mime||'text/plain')+';charset=utf-8,'+encodeURIComponent(text);a.download=name;a.click(); }
function todayUTC(){ var d=new Date();return d.getUTCFullYear()+'-'+('0'+(d.getUTCMonth()+1)).slice(-2)+'-'+('0'+d.getUTCDate()).slice(-2); }

// ── TIME HELPERS ──────────────────────────────────────────────────────────
function parseUTC(s){ if(!s)return null;var m=s.match(/^(\d{1,2}):(\d{2})$/);if(!m)return null;return parseInt(m[1])+parseInt(m[2])/60; }
function timeDiff(a,b){ if(a===null||b===null)return null;var d=b-a;if(d<0)d+=24;return d; }
function decToHM(d){ if(d===null||d===undefined||isNaN(d))return '--';var h=Math.floor(d),m=Math.round((d-h)*60);return h+':'+(m<10?'0':'')+m; }
function dec2(v){ if(v===null||v===undefined||isNaN(parseFloat(v)))return '--';return parseFloat(v).toFixed(2); }
function instrDiff(a,b){ var x=parseFloat(a),y=parseFloat(b);if(isNaN(x)||isNaN(y)||y<x)return null;return y-x; }
function nowUTCRounded(){ var d=new Date();var tot=d.getUTCHours()*60+d.getUTCMinutes();var r=Math.round(tot/6)*6;if(r>=1440)r=0;return ('0'+Math.floor(r/60)).slice(-2)+':'+('0'+(r%60)).slice(-2); }

// ── WIND ──────────────────────────────────────────────────────────────────
function rwyWind(rwyNum,windDir,windSpd){
  var r=parseFloat(rwyNum)*10,d=parseFloat(windDir),s=parseFloat(windSpd);
  if(isNaN(r)||isNaN(d)||isNaN(s))return null;
  var a=(d-r)*Math.PI/180;
  var hw=s*Math.cos(a),xw=s*Math.sin(a);
  return{hwAbs:Math.round(Math.abs(hw)),xwAbs:Math.round(Math.abs(xw)),hwLabel:hw>=0?'HW':'TW',xwLabel:xw>=0?'R':'L'};
}

// ── FUEL ──────────────────────────────────────────────────────────────────
var SETTINGS = load('fd_settings',{burnRate:'8.0'});
function saveSets(){ save('fd_settings',SETTINGS); }

function fuelCalc(f){
  var burn=parseFloat(f.burnRate||SETTINGS.burnRate)||8;
  var taxi=parseFloat(f.fuelTaxi)||0, trip=parseFloat(f.fuelTrip)||0;
  var cont=trip*(parseFloat(f.fuelContPct)||5)/100;
  var alt=parseFloat(f.fuelAlt)||0, fin=parseFloat(f.fuelFinal)||0, extra=parseFloat(f.fuelExtra)||0;
  var total=taxi+trip+cont+alt+fin+extra;
  var fob=parseFloat(f.fob);
  return{burn:burn,taxi:taxi,trip:trip,cont:cont,contPct:parseFloat(f.fuelContPct)||5,
         alt:alt,final_:fin,extra:extra,total:total,
         fob:isNaN(fob)?null:fob,
         surplus:isNaN(fob)?null:fob-total,
         endurance:isNaN(fob)||burn<=0?null:fob/burn};
}
function flTimes(f){
  return{block:timeDiff(parseUTC(f.chocksOff),parseUTC(f.chocksOn)),
         air:timeDiff(parseUTC(f.takeoff),parseUTC(f.landing)),
         tacho:instrDiff(f.tachoStart,f.tachoEnd),
         hobbs:instrDiff(f.hobbsStart,f.hobbsEnd)};
}

// ── METAR FILTER ──────────────────────────────────────────────────────────
function filterMetars(txt,chocksOff,chocksOn,etob){
  if(!txt)return txt;
  var MARGIN=1.0;
  var ws,we,off=parseUTC(chocksOff),on=parseUTC(chocksOn),et=parseUTC(etob);
  if(off!==null){ ws=off-MARGIN;we=(on!==null?on:off)+MARGIN; }
  else if(et!==null){ ws=et-MARGIN;we=et+MARGIN; }
  else return txt;
  if(ws<0)ws+=24; if(we>=24)we-=24;
  var lines=txt.split('\n').filter(function(l){return l.trim().length>6;});
  var filtered=lines.filter(function(line){
    var p=line.trim().split(/\s+/);
    var tok=p.length>1?p[1]:'';
    var m6=tok.match(/^\d{2}(\d{2})(\d{2})[Zz]/);
    var m4=tok.match(/^(\d{2})(\d{2})[Zz]/);
    var mh=null;
    if(m6)mh=parseInt(m6[1])+parseInt(m6[2])/60;
    else if(m4)mh=parseInt(m4[1])+parseInt(m4[2])/60;
    if(mh===null)return true;
    return ws<=we?(mh>=ws&&mh<=we):(mh>=ws||mh<=we);
  });
  return filtered.length?filtered.join('\n'):lines[0]||txt;
}

// ── WEATHER FETCH ─────────────────────────────────────────────────────────
function fetchWx(icao,cb){
  var key=localStorage.getItem('fd_avwx_key')||'';
  var BASE='https://avwx.rest/api/';
  var NOAA='https://aviationweather.gov/api/data/';
  var AO='https://api.allorigins.win/raw?url=';

  function setStatus(msg){
    document.querySelectorAll('#wx-fetch-status').forEach(function(el){el.textContent=msg;});
  }
  function cleanNoaa(txt){
    if(!txt)return '';
    return txt.split('\n').map(function(l){return l.trim();})
      .filter(function(l){return l.length>6&&l.charAt(0)!=='<'&&l.indexOf('No data')<0;})
      .join('\n');
  }

  setStatus('Fetching '+icao+'...');

  if(key){
    var hdrs={'Authorization':'BEARER '+key};
    var metar='',taf='',n=0;
    function fin(){
      if(++n===2){setStatus(metar?'Done':'No data for '+icao);cb(metar,taf);}
    }

    // METAR with onfail=nearest - use filter=raw,station to keep response small
    fetch(BASE+'metar/'+icao+'?onfail=nearest&filter=raw,station&format=json',{headers:hdrs})
      .then(function(r){return r.json();})
      .then(function(d){
        if(d&&d.raw){
          metar=d.raw;
          // Note if nearest was used (station field will differ from requested icao)
          if(d.station&&d.station!==icao){
            metar='[Nearest: '+d.station+'] '+metar;
          }
        } else if(d&&d.error){
          metar='';
        }
        fin();
      })
      .catch(function(){fin();});

    // TAF with onfail=nearest
    fetch(BASE+'taf/'+icao+'?onfail=nearest&filter=raw,station&format=json',{headers:hdrs})
      .then(function(r){return r.json();})
      .then(function(d){
        if(d&&d.raw)taf=d.raw;
        else if(d&&d.sanitized)taf=d.sanitized;
        fin();
      })
      .catch(function(){fin();});

  } else {
    // No key - NOAA via allorigins
    var m2='',t2='',n2=0;
    function fin2(){
      if(++n2===2){
        setStatus(m2?'Done':'No data (add AVWX key in Settings for better results)');
        cb(m2,t2);
      }
    }
    fetch(AO+encodeURIComponent(NOAA+'metar?ids='+icao+'&format=raw&hours=6'))
      .then(function(r){return r.text();})
      .then(function(t){m2=cleanNoaa(t);fin2();})
      .catch(function(){fin2();});
    fetch(AO+encodeURIComponent(NOAA+'taf?ids='+icao+'&format=raw'))
      .then(function(r){return r.text();})
      .then(function(t){t2=cleanNoaa(t);fin2();})
      .catch(function(){fin2();});
  }
}

function field(lbl,inp){ return '<div class="field"><label>'+lbl+'</label>'+inp+'</div>'; }
function inp(id,type,ph,val){ return '<input class="inp" id="'+id+'" type="'+(type||'text')+'" placeholder="'+(ph||'')+'" value="'+(val||'')+'"/>'; }
function ninp(id,ph,val,step){ return '<input class="inp" id="'+id+'" type="number" step="'+(step||'0.1')+'" placeholder="'+(ph||'')+'" value="'+(val||'')+'"/>'; }
function ta(id,rows,val,ph){ return '<textarea class="inp" id="'+id+'" rows="'+(rows||3)+'" placeholder="'+(ph||'')+'">'+((val||''))+'</textarea>'; }
function sel(id,opts,selected){ return '<select class="inp" id="'+id+'">'+opts.map(function(o){return '<option'+(o===selected?' selected':'')+'>'+o+'</option>';}).join('')+'</select>'; }

function fpair(lbl,baseId,usgVal){
  var u=usgVal||'',l='';
  if(u!==''){var n=parseFloat(u);if(!isNaN(n))l=(n*USG_L).toFixed(2);}
  return '<div class="field"><label>'+lbl+'</label><div class="fpair">'+
    '<div class="fpair-wrap"><input class="inp" id="'+baseId+'-u" type="number" step="0.01" placeholder="USG" value="'+u+'"/><span class="fpair-unit">USG</span></div>'+
    '<span style="color:var(--mut);">=</span>'+
    '<div class="fpair-wrap"><input class="inp" id="'+baseId+'-l" type="number" step="0.01" placeholder="L" value="'+l+'"/><span class="fpair-unit">L</span></div>'+
    '</div></div>';
}
function wireFpair(baseId,container,onChange){
  var u=qs('#'+baseId+'-u',container),l=qs('#'+baseId+'-l',container);
  if(!u||!l)return;
  u.oninput=function(){var v=parseFloat(u.value);l.value=isNaN(v)?'':(v*USG_L).toFixed(2);if(onChange)onChange();};
  l.oninput=function(){var v=parseFloat(l.value);u.value=isNaN(v)?'':(v/USG_L).toFixed(2);if(onChange)onChange();};
}

function timeSpinner(baseId,stored){
  var h='',m='';
  if(stored&&/^\d{1,2}:\d{2}$/.test(stored)){var p=stored.split(':');h=('0'+parseInt(p[0])).slice(-2);m=p[1];}
  var ho='<option value="">HH</option>';
  for(var i=0;i<24;i++){var v=('0'+i).slice(-2);ho+='<option value="'+v+'"'+(h===v?' selected':'')+'>'+v+'</option>';}
  var mo='<option value="">MM</option>';
  ['00','06','12','18','24','30','36','42','48','54'].forEach(function(v){mo+='<option value="'+v+'"'+(m===v?' selected':'')+'>'+v+'</option>';});
  return '<div style="display:flex;gap:4px;align-items:center">'+
    '<select class="inp" id="'+baseId+'-h" style="flex:1">'+ho+'</select>'+
    '<span style="color:var(--mut);font-weight:700">:</span>'+
    '<select class="inp" id="'+baseId+'-m" style="flex:1">'+mo+'</select>'+
    '</div>';
}
function getTime(baseId,ctx){
  var h=qs('#'+baseId+'-h',ctx),m=qs('#'+baseId+'-m',ctx);
  return (h&&m&&h.value&&m.value)?h.value+':'+m.value:'';
}
function wireTimeChange(baseId,ctx,fn){
  var h=qs('#'+baseId+'-h',ctx),m=qs('#'+baseId+'-m',ctx);
  if(h)h.onchange=fn;if(m)m.onchange=fn;
}
function stampTime(baseId,ctx){
  var t=nowUTCRounded().split(':');
  var h=qs('#'+baseId+'-h',ctx),m=qs('#'+baseId+'-m',ctx);
  if(h)h.value=t[0];if(m)m.value=t[1];
}

function dateDDs(stored){
  var yr='',mo='',dy='';
  if(stored){var p=stored.split('-');if(p.length===3){yr=p[0];mo=p[1];dy=p[2];}}
  var now=new Date().getUTCFullYear();
  var ds='<select class="inp" id="m-day" style="flex:1"><option value="">DD</option>';
  for(var d=1;d<=31;d++){var v=('0'+d).slice(-2);ds+='<option value="'+v+'"'+(dy===v?' selected':'')+'>'+v+'</option>';}
  ds+='</select>';
  var ms='<select class="inp" id="m-mon" style="flex:1.5"><option value="">MMM</option>';
  ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'].forEach(function(mn,i){
    var v=('0'+(i+1)).slice(-2);ms+='<option value="'+v+'"'+(mo===v?' selected':'')+'>'+mn+'</option>';
  });
  ms+='</select>';
  var ys='<select class="inp" id="m-yr" style="flex:1.2"><option value="">YYYY</option>';
  for(var y=now;y>=now-5;y--){ys+='<option value="'+y+'"'+(yr===String(y)?' selected':'')+'>'+y+'</option>';}
  ys+='</select>';
  return '<div style="display:flex;gap:5px">'+ds+ms+ys+'</div>';
}

function exportFlight(f){
  var c=flTimes(f),fc=fuelCalc(f);
  var mDep=filterMetars(f.wxMetarDep,f.chocksOff,f.chocksOn,f.etob);
  var mDest=filterMetars(f.wxMetarDest,f.chocksOff,f.chocksOn,f.etob);
  var lines=['FLIGHT RECORD','============',
    'Date: '+(f.date||'--'),'Aircraft: '+(f.aircraft||'--'),'Category: '+(f.category||'--'),
    'Route: '+(f.departure||'?')+' to '+(f.destination||'?'),'PIC: '+(f.pic||'--'),'Student: '+(f.student||'--'),
    'ETOB: '+(f.etob||'--')+' UTC',
    '','WEATHER',
    'Surface Wind: '+(f.wxSurfDir?f.wxSurfDir+'deg/'+f.wxSurfSpd+'kt':'--'),
    'RWY: '+(f.rwy1||'--')+(f.rwy2?' & '+f.rwy2:''),
    'TAS: '+(f.wxTAS||'--')+' kt  Freeze: '+(f.wxFreezFL||'--')+' ft',
    'DEP METAR: '+(mDep||'--'),'DEP TAF: '+(f.wxTafDep||'--'),
    'DEST METAR: '+(mDest||'--'),'DEST TAF: '+(f.wxTafDest||'--'),
    '','TIMES (UTC)',
    'Chocks Off: '+(f.chocksOff||'--'),'Takeoff: '+(f.takeoff||'--'),
    'Landing: '+(f.landing||'--'),'Chocks On: '+(f.chocksOn||'--'),
    '','CALCULATED',
    'Block: '+decToHM(c.block)+' ('+dec2(c.block)+' hrs)',
    'Air:   '+decToHM(c.air)+' ('+dec2(c.air)+' hrs)',
    'Tacho: '+dec2(c.tacho)+' ['+f.tachoStart+' to '+f.tachoEnd+']',
    'Hobbs: '+dec2(c.hobbs)+' ['+f.hobbsStart+' to '+f.hobbsEnd+']',
    '','FUEL  Burn: '+fc.burn+' USG/hr',
    'FOB: '+dec2(fc.fob)+' USG  Endurance: '+decToHM(fc.endurance),
    'Total Req: '+dec2(fc.total)+' USG  Surplus: '+dec2(fc.surplus)+' USG',
    'Oil: '+(f.oil||'--')+'  Uplifted: '+(f.fuelUplifted||'--')+' USG',
    '','MANEUVERS',f.maneuvers||'--','','NOTES',f.notes||'--'];
  if(f.defects&&f.defects.length){lines.push('','DEFECTS');f.defects.forEach(function(d){lines.push('  - '+d.text+(d.reportable?' [REPORTABLE]':''));});}
  if(f.safetyReports&&f.safetyReports.length){lines.push('','SAFETY');f.safetyReports.forEach(function(r){lines.push('  '+r.title+(r.reportable?' [REPORTABLE]':'')+'\n  '+r.description);});}
  dl('flight_'+(f.date||'?')+'_'+(f.aircraft||'?')+'.txt',lines.join('\n'));
  toast('Exported');
}

function exportAllFlights(){
  if(!flights.length){toast('No flights');return;}
  var hdr='Date,Aircraft,Category,Dep,Dest,PIC,Student,ETOB,Block,Air,Tacho,Hobbs,FOB,BurnRate,TotalFuel,Surplus';
  var rows=flights.map(function(f){
    var c=flTimes(f),fc=fuelCalc(f);
    return[f.date,f.aircraft,f.category,f.departure,f.destination,f.pic,f.student,f.etob,
      decToHM(c.block),decToHM(c.air),dec2(c.tacho),dec2(c.hobbs),dec2(fc.fob),fc.burn,dec2(fc.total),dec2(fc.surplus)].join(',');
  });
  dl('FlightDeck_log.csv',[hdr].concat(rows).join('\n'),'text/csv');
  toast('Exported CSV');
}

      f.wxMetarDest=qs('#m-mDest',tWx)?qs('#m-mDest',tWx).value:'';
      f.wxTafDest=qs('#m-tDest',tWx)?qs('#m-tDest',tWx).value:'';
      f.fob=g('m-fob-u',tFuel);f.burnRate=g('m-burn',tFuel);
      f.fuelTaxi=g('m-ftaxi-u',tFuel);f.fuelTrip=g('m-ftrip-u',tFuel);
      f.fuelContPct=g('m-fcont',tFuel);f.fuelAlt=g('m-falt-u',tFuel);
      f.fuelFinal=g('m-ffin-u',tFuel);f.fuelExtra=g('m-fext-u',tFuel);

      if(!ex)flights.push(f);

    }
  });

  // ── Wire weather ──
  function g2(id,ctx){var e=qs('#'+id,ctx);return e?e.value.trim():'';}
  function wxCalc(){
    var r1=g2('m-rwy1',tWx),r2=g2('m-rwy2',tWx),dir=g2('m-wdir',tWx),spd=g2('m-wspd',tWx);
    var r1l=qs('#rwy1-lbl',tWx),r2l=qs('#rwy2-lbl',tWx);
    if(r1l)r1l.textContent='RWY '+(r1||'1');if(r2l)r2l.textContent='RWY '+(r2||'2');
    function setRwy(sfx,rwy){
      var c=rwyWind(rwy,dir,spd);
      if(c){
        setText('wx-r'+sfx+'-hw',String(c.hwAbs),tWx);
        var hwl=qs('#wx-r'+sfx+'-hwl',tWx);if(hwl){hwl.textContent=c.hwLabel+' kt';hwl.style.color=c.hwLabel==='HW'?'var(--em)':'var(--ros)';}
        setText('wx-r'+sfx+'-xw',String(c.xwAbs),tWx);
        var xwl=qs('#wx-r'+sfx+'-xwl',tWx);if(xwl)xwl.textContent=c.xwLabel+' kt';
      } else {
        setText('wx-r'+sfx+'-hw','--',tWx);setText('wx-r'+sfx+'-xw','--',tWx);
        var hwl2=qs('#wx-r'+sfx+'-hwl',tWx);if(hwl2)hwl2.textContent='';
        var xwl2=qs('#wx-r'+sfx+'-xwl',tWx);if(xwl2)xwl2.textContent='';
      }
    }
    setRwy('1',r1);setRwy('2',r2);
  }
  ['m-rwy1','m-rwy2','m-wdir','m-wspd'].forEach(function(id){var e=qs('#'+id,tWx);if(e)e.oninput=wxCalc;});
  if(ex)setTimeout(wxCalc,0);

  function doFetch(){
    var dep=g2('m-dep',tDet).toUpperCase(),dest=g2('m-dest',tDet).toUpperCase();
    var depLbl=qs('#wx-dep-lbl',tWx),destLbl=qs('#wx-dest-lbl',tWx);
    if(depLbl)depLbl.textContent=dep||'--';if(destLbl)destLbl.textContent=dest||'--';
    var toFetch=[];
    if(dep.length>=3){var s1={icao:dep,sfxList:['Dep']};if(dest.length>=3&&dest===dep)s1.sfxList.push('Dest');toFetch.push(s1);}
    if(dest.length>=3&&dest!==dep)toFetch.push({icao:dest,sfxList:['Dest']});
    if(!toFetch.length)return;
    var done=0;
    toFetch.forEach(function(item){
      fetchWx(item.icao,function(metar,taf){
        item.sfxList.forEach(function(sfx){
          var mEl=qs('#m-m'+sfx,tWx),tEl=qs('#m-t'+sfx,tWx);
          if(mEl)mEl.value=metar||'';
          if(tEl)tEl.value=taf||'';
        });
        if(++done===toFetch.length){var st=qs('#wx-fetch-status',tWx);if(st)st.textContent='Done';}
      });
    });
  }
  qs('#wx-fetch-btn',tWx).onclick=doFetch;
  var depEl2=qs('#m-dep',tDet),destEl2=qs('#m-dest',tDet);
  if(depEl2)depEl2.onchange=function(){setTimeout(doFetch,300);};
  if(destEl2)destEl2.onchange=function(){setTimeout(doFetch,300);};
  if(ex&&(f.departure||f.destination))setTimeout(function(){wxCalc();doFetch();},100);

  // ── Wire fuel ──
  function fuelLive(){
    var burn2=parseFloat(g2('m-burn',tFuel))||parseFloat(SETTINGS.burnRate)||8;
    var fob2=parseFloat(g2('m-fob-u',tFuel));
    setText('fob-end',(!isNaN(fob2)&&burn2>0)?decToHM(fob2/burn2):'--',tFuel);
    var tmpF={burnRate:g2('m-burn',tFuel)||SETTINGS.burnRate,
      fuelTaxi:g2('m-ftaxi-u',tFuel),fuelTrip:g2('m-ftrip-u',tFuel),fuelContPct:g2('m-fcont',tFuel),
      fuelAlt:g2('m-falt-u',tFuel),fuelFinal:g2('m-ffin-u',tFuel),fuelExtra:g2('m-fext-u',tFuel),fob:g2('m-fob-u',tFuel)};
    var fc2=fuelCalc(tmpF);
    setText('fr-taxi',dec2(fc2.taxi)+' USG',tFuel);setText('fr-trip',dec2(fc2.trip)+' USG',tFuel);
    setText('fr-cont',dec2(fc2.cont)+' USG ('+dec2(fc2.contPct)+'%)',tFuel);
    setText('fr-alt',dec2(fc2.alt)+' USG',tFuel);setText('fr-fin',dec2(fc2.final_)+' USG',tFuel);
    setText('fr-ext',dec2(fc2.extra)+' USG',tFuel);setText('fr-total',dec2(fc2.total)+' USG',tFuel);
    var surEl=qs('#fr-surplus',tFuel);
    if(surEl){surEl.textContent=fc2.surplus!==null?dec2(fc2.surplus)+' USG':'--';surEl.style.color=fc2.surplus===null?'var(--mut)':fc2.surplus>=0?'var(--em)':'var(--ros)';}
  }
  ['m-fob','m-ftaxi','m-ftrip','m-falt','m-ffin','m-fext'].forEach(function(b){wireFpair(b,tFuel,fuelLive);});
  ['m-burn','m-fcont'].forEach(function(id){var e=qs('#'+id,tFuel);if(e)e.oninput=fuelLive;});
  if(ex)setTimeout(fuelLive,0);

  // ── Wire times ──
  function timesLive(){
    setText('t-tacho',dec2(instrDiff(g2('m-ts',tTimes),g2('m-te',tTimes))),tTimes);
    setText('t-hobbs',dec2(instrDiff(g2('m-hs',tTimes),g2('m-he',tTimes))),tTimes);
    setText('t-block',decToHM(timeDiff(parseUTC(getTime('m-off',tTimes)),parseUTC(getTime('m-on',tTimes)))),tTimes);
    setText('t-air',decToHM(timeDiff(parseUTC(getTime('m-tkf',tTimes)),parseUTC(getTime('m-ldg',tTimes)))),tTimes);
  }
  ['m-ts','m-te','m-hs','m-he'].forEach(function(id){var e=qs('#'+id,tTimes);if(e)e.oninput=timesLive;});
  ['m-off','m-tkf','m-ldg','m-on'].forEach(function(id){wireTimeChange(id,tTimes,timesLive);});
  [{id:'st-off',fld:'m-off'},{id:'st-tkf',fld:'m-tkf'},{id:'st-ldg',fld:'m-ldg'},{id:'st-on',fld:'m-on'}].forEach(function(item){
    var btn=qs('#'+item.id,tTimes);if(btn)btn.onclick=function(){stampTime(item.fld,tTimes);timesLive();};
  });
  if(ex)setTimeout(timesLive,0);
}

function emailFlight(f){
  var c=flTimes(f),fc=fuelCalc(f);
  var mDep=filterMetars(f.wxMetarDep,f.chocksOff,f.chocksOn,f.etob);
  var mDest=filterMetars(f.wxMetarDest,f.chocksOff,f.chocksOn,f.etob);
  var subj=encodeURIComponent('Flight: '+(f.date||'?')+' '+( f.aircraft||'?')+' '+(f.departure||'?')+'-'+(f.destination||'?'));
  var lines=['FLIGHT RECORD','============',
    'Date: '+(f.date||'--'),'Aircraft: '+(f.aircraft||'--'),'Category: '+(f.category||'--'),
    'Route: '+(f.departure||'?')+' to '+(f.destination||'?'),
    'PIC: '+(f.pic||'--'),'Student: '+(f.student||'--'),'ETOB: '+(f.etob||'--')+' UTC',
    '','WEATHER',
    'Surface: '+(f.wxSurfDir?f.wxSurfDir+'deg/'+f.wxSurfSpd+'kt':'--')+
      '  TAS: '+(f.wxTAS||'--')+'kt  Freeze: '+(f.wxFreezFL||'--')+'ft',
    'DEP METAR: '+(mDep||'--'),'DEP TAF: '+(f.wxTafDep||'--'),
    'DEST METAR: '+(mDest||'--'),'DEST TAF: '+(f.wxTafDest||'--'),
    '','TIMES','Chocks Off: '+(f.chocksOff||'--'),'Takeoff: '+(f.takeoff||'--'),
    'Landing: '+(f.landing||'--'),'Chocks On: '+(f.chocksOn||'--'),
    '','CALCULATED',
    'Block: '+decToHM(c.block)+'  Air: '+decToHM(c.air),
    'Tacho: '+dec2(c.tacho)+'  Hobbs: '+dec2(c.hobbs),
    '','FUEL  Burn: '+fc.burn+' USG/hr',
    'FOB: '+dec2(fc.fob)+' USG  End: '+decToHM(fc.endurance),
    'Total Req: '+dec2(fc.total)+' USG  Surplus: '+dec2(fc.surplus)+' USG',
    'Oil: '+(f.oil||'--')+'  Uplifted: '+(f.fuelUplifted||'--')+' USG',
    '','MANEUVERS',f.maneuvers||'--','','NOTES',f.notes||'--'];
  if(f.defects&&f.defects.length){lines.push('','DEFECTS');f.defects.forEach(function(d){lines.push('  - '+d.text+(d.reportable?' [REPORTABLE]':''));});}
  if(f.safetyReports&&f.safetyReports.length){lines.push('','SAFETY');f.safetyReports.forEach(function(r){lines.push('  '+r.title+(r.reportable?' [REPORTABLE]':'')+'\n  '+r.description);});}
  lines.push('','-- FlightDeck v24');
  window.location.href='mailto:Tom@teboo.ltd?subject='+subj+'&body='+encodeURIComponent(lines.join('\n'));
}

    ls.title=qs('#m-lst',div).value.trim();if(!ls.title)return false;
    ls.stage=qs('#m-lss',div).value;ls.duration=qs('#m-lsd',div).value;
    ls.objective=qs('#m-lso',div).value;ls.content=qs('#m-lsc',div).value;ls.notes=qs('#m-lsn',div).value;
    if(!ex)lessons.push(ls);else{var i=lessons.findIndex(function(x){return x.id===ls.id;});if(i>=0)lessons[i]=ls;}
    lsSave();lsSel=ls.id;renderLsList();renderLsDetail();toast(ex?'Updated':'Created');
  }});
}
qs('#ls-new').onclick=function(){openLsModal(null);};

// ═══════════════════════════════════════════════════════════════════════════
// REFERENCES
// ═══════════════════════════════════════════════════════════════════════════
var RF_KEY='fd_references';
var RF_CATS=['Regulations','Weather','Navigation','Systems','Maneuvers','Emergency','Performance','Other'];
var refs=load(RF_KEY,[
  {id:'rf1',title:'VFR Weather Minimums',category:'Weather',content:'Class G below 1200ft AGL: 1500m vis, clear of cloud\nClass G above 1200ft AGL: 5000m, 1500m horiz/300m vert\nClass E/D/C: 5000m, 1500m horiz/300m vert'},
  {id:'rf2',title:'AROW Documents',category:'Regulations',content:'A - Airworthiness Certificate\nR - Registration\nO - Operating Handbook (AFM/POH)\nW - Weight and Balance'}
]);
var rfSel=null;
function rfSave(){ save(RF_KEY,refs); }
function renderRfFilter(){
  var el=qs('#rf-filter');el.innerHTML='';
  ['All'].concat(RF_CATS).forEach(function(c){
    var ch=mkEl('div','fchip'+(c==='All'?' on':''),c);
    ch.onclick=function(){el.querySelectorAll('.fchip').forEach(function(x){x.classList.remove('on');});ch.classList.add('on');renderRfList();};
    el.appendChild(ch);
  });
}
function renderRfList(){
  var el=qs('#rf-list');el.innerHTML='';
  var fc=qs('#rf-filter .fchip.on');var fv=fc?fc.textContent:'All';
  var srch=(qs('#rf-search').value||'').toLowerCase();
  refs.filter(function(r){return(fv==='All'||r.category===fv)&&(!srch||r.title.toLowerCase().includes(srch)||r.content.toLowerCase().includes(srch));}).forEach(function(rf){
    var card=mkEl('div','card'+(rfSel===rf.id?' sel':''));
    card.innerHTML='<div class="ctitle">'+rf.title+'</div><div class="cmeta"><span class="badge b-am">'+rf.category+'</span></div>';
    card.onclick=function(){rfSel=rf.id;renderRfList();renderRfDetail();};
    el.appendChild(card);
  });
}
function renderRfDetail(){
  var det=qs('#rf-detail');
  if(!rfSel){det.innerHTML='<div class="empty"><div class="empty-icon">&#128203;</div><span>Select a reference</span></div>';return;}
  var rf=refs.find(function(x){return x.id===rfSel;});
  if(!rf){det.innerHTML='<div class="empty">Not found</div>';return;}
  det.innerHTML='';var box=mkEl('div','dbox');
  box.innerHTML='<div style="display:flex;align-items:flex-start;justify-content:space-between;gap:8px">'+
    '<div><div style="font-weight:700;font-size:16px">'+rf.title+'</div>'+
    '<div class="cmeta" style="margin-top:4px"><span class="badge b-am">'+rf.category+'</span></div></div>'+
    '<div style="display:flex;gap:5px"><button class="btn btn-g" id="rf-edit">Edit</button><button class="btn btn-d" id="rf-del">&#10005;</button></div>'+
    '</div>'+
    '<div class="sec-box" style="flex:1;white-space:pre-wrap;margin-top:8px">'+rf.content+'</div>';
  det.appendChild(box);
  qs('#rf-edit',box).onclick=function(){openRfModal(rf);};
  qs('#rf-del',box).onclick=function(){if(confirm('Delete?')){refs=refs.filter(function(x){return x.id!==rf.id;});rfSave();rfSel=null;renderRfList();renderRfDetail();toast('Deleted');}};
}
function openRfModal(ex){
  var rf=ex||{id:uid(),title:'',category:'Regulations',content:''};
  var div=document.createElement('div');
  div.innerHTML=field('Title',inp('m-rft','text','',rf.title))+field('Category',sel('m-rfc',RF_CATS,rf.category))+field('Content',ta('m-rfc2',10,rf.content,''));
  openModal({title:ex?'Edit Reference':'New Reference',body:div,saveLabel:ex?'Save':'Create',onSave:function(){
    rf.title=qs('#m-rft',div).value.trim();if(!rf.title)return false;
    rf.category=qs('#m-rfc',div).value;rf.content=qs('#m-rfc2',div).value;
    if(!ex)refs.push(rf);else{var i=refs.findIndex(function(x){return x.id===rf.id;});if(i>=0)refs[i]=rf;}
    rfSave();rfSel=rf.id;renderRfList();renderRfDetail();toast(ex?'Updated':'Created');
  }});
}
qs('#rf-new').onclick=function(){openRfModal(null);};
qs('#rf-search').oninput=renderRfList;

// ═══════════════════════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════════════════════
renderFlFilters(); renderFlStats(); renderFlList();
renderClFilter(); renderClList();
renderLsFilter(); renderLsList();
renderRfFilter(); renderRfList();
</script>
</body>
