<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<meta name="theme-color" content="#020617"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-title" content="FlightDeck"/>
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate"/>
<meta http-equiv="Pragma" content="no-cache"/>
<meta http-equiv="Expires" content="0"/>
<title>FlightDeck</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=B612:wght@400;700&family=B612+Mono:wght@400;700&family=Syne:wght@700;800&display=swap');
:root{--bg:#f0f4f8;--sur:#ffffff;--card:#e8edf2;--bdr:#c8d4e0;--txt:#1a2332;--mut:#5a6a7a;--sky:#0077cc;--em:#0a8a4a;--amb:#cc7700;--ros:#cc2244;--vio:#6644aa;}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--bg);color:var(--txt);font-family:'B612',sans-serif;font-size:16px}
::-webkit-scrollbar{width:4px;height:4px}::-webkit-scrollbar-thumb{background:#b0bec8;border-radius:2px}
button{cursor:pointer;font-family:inherit}input,textarea,select{font-family:inherit}
#app{display:flex;flex-direction:column;height:100vh;overflow:hidden}
header{flex-shrink:0;background:rgba(240,244,248,.97);border-bottom:1px solid var(--bdr);box-shadow:0 1px 4px rgba(0,0,0,.08);z-index:50}
.hdr{max-width:1280px;margin:0 auto;padding:0 16px;display:flex;align-items:center;gap:8px;height:52px}
.logo{display:flex;align-items:center;gap:8px;margin-right:auto}
.logo-icon{width:26px;height:26px;background:linear-gradient(135deg,var(--sky),var(--vio));border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:13px}
.logo-name{font-family:'Syne',sans-serif;font-weight:700;font-size:15px;color:#fff}
nav{display:flex;gap:2px}
.tb{padding:5px 11px;border-radius:7px;border:1px solid transparent;background:transparent;color:var(--mut);font-size:12px;font-weight:500;transition:all .15s;white-space:nowrap}
.tb.on{border-color:var(--sky);background:rgba(0,119,204,.12);color:#0066bb}
.tb:hover:not(.on){background:var(--card);color:var(--txt)}
.pwa-btn{padding:4px 10px;border-radius:6px;border:1px solid var(--em);background:rgba(16,185,129,.12);color:#34d399;font-size:11px;display:none;cursor:pointer}
main{flex:1;overflow:hidden;max-width:1280px;width:100%;margin:0 auto;padding:14px 16px;display:flex;flex-direction:column}
.panel{display:none;flex:1;overflow:hidden;flex-direction:column}
.panel.on{display:flex}
/* two-pane */
.panes{display:flex;gap:12px;flex:1;overflow:hidden}
.sidebar{width:220px;flex-shrink:0;display:flex;flex-direction:column;gap:7px;overflow:hidden}
.slist{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:4px;padding-right:2px}
.detail{flex:1;min-width:0;overflow:hidden}
.dbox{background:#ffffff;border:1px solid var(--bdr);border-radius:14px;padding:16px;height:100%;display:flex;flex-direction:column;overflow-y:auto}
.empty{height:100%;display:flex;align-items:center;justify-content:center;color:var(--mut);font-size:13px;flex-direction:column;gap:8px}
.empty-icon{font-size:34px;opacity:.3}
/* cards */
.card{background:#edf1f5;border:1px solid var(--bdr);border-radius:10px;padding:10px;cursor:pointer;transition:all .15s}
.card:hover{border-color:#8899aa}
.card.sel-sky{border-color:var(--sky)!important;background:rgba(14,165,233,.08)!important}
.card.sel-em{border-color:var(--em)!important;background:rgba(16,185,129,.08)!important}
.card.sel-am{border-color:var(--amb)!important;background:rgba(245,158,11,.08)!important}
.ctitle{font-weight:700;font-size:13px;color:#fff;margin-bottom:4px;line-height:1.3}
.cmeta{display:flex;align-items:center;gap:4px;flex-wrap:wrap}
/* detail header */
.dh{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:12px;gap:8px}
.dtitle{font-family:'Syne',sans-serif;font-weight:700;font-size:18px;color:#fff;line-height:1.2}
.dact{display:flex;gap:5px;flex-shrink:0;flex-wrap:wrap}
/* badges */
.badge{font-family:'B612 Mono',monospace;font-size:10px;padding:2px 6px;border-radius:4px;border:1px solid;white-space:nowrap}
.b-sky{background:rgba(14,165,233,.12);color:#7dd3fc;border-color:rgba(14,165,233,.35)}
.b-em{background:rgba(16,185,129,.12);color:#6ee7b7;border-color:rgba(16,185,129,.35)}
.b-am{background:rgba(245,158,11,.12);color:#fcd34d;border-color:rgba(245,158,11,.35)}
.b-vi{background:rgba(139,92,246,.12);color:#c4b5fd;border-color:rgba(139,92,246,.35)}
.b-ro{background:rgba(244,63,94,.12);color:#fda4af;border-color:rgba(244,63,94,.35)}
.b-sl{background:rgba(100,116,139,.12);color:#94a3b8;border-color:rgba(100,116,139,.35)}
/* buttons */
.btn{padding:6px 13px;border-radius:8px;border:none;font-size:12px;font-weight:500;transition:all .15s;font-family:'B612',sans-serif}
.btn-p{background:var(--sky);color:#fff}.btn-p:hover{background:#38bdf8}
.btn-g{background:transparent;border:1px solid var(--bdr);color:#94a3b8}.btn-g:hover{background:var(--card);color:var(--txt)}
.btn-d{background:rgba(244,63,94,.12);border:1px solid rgba(244,63,94,.35);color:#fda4af}.btn-d:hover{background:rgba(244,63,94,.22)}
.btn-s{background:var(--em);color:#fff}.btn-s:hover{background:#34d399;color:#000}
.btn-full{width:100%;text-align:center;padding:8px}
/* forms */
.sdiv{font-family:'B612 Mono',monospace;font-size:10px;color:var(--sky);text-transform:uppercase;letter-spacing:.1em;padding:8px 0 4px;border-bottom:1px solid rgba(14,165,233,.2);margin-bottom:10px;margin-top:8px}
.field{margin-bottom:11px}
.field label{display:block;font-family:'B612 Mono',monospace;font-size:10px;color:var(--mut);text-transform:uppercase;letter-spacing:.08em;margin-bottom:4px}
.inp{width:100%;background:var(--card);border:1px solid var(--bdr);border-radius:8px;padding:7px 10px;color:var(--txt);font-size:13px;transition:border-color .15s;outline:none}
.inp:focus{border-color:var(--sky)}
textarea.inp{resize:vertical;min-height:65px;line-height:1.5}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.g4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:10px}
/* stats */
.stat-row{display:flex;gap:7px;margin-bottom:12px;flex-wrap:wrap}
.stat{background:rgba(0,119,204,.08);border:1px solid rgba(0,119,204,.25);border-radius:9px;padding:8px 12px;text-align:center;min-width:80px}
.stat-v{font-family:'Syne',sans-serif;font-size:19px;font-weight:700;color:#0077cc}
.stat-l{font-size:10px;color:var(--mut);margin-top:1px}
/* section blocks */
.sec{margin-bottom:10px}
.sec-lbl{font-family:'B612 Mono',monospace;font-size:10px;color:var(--mut);text-transform:uppercase;letter-spacing:.1em;margin-bottom:4px}
.sec-box{background:#f7f9fb;border:1px solid var(--bdr);border-radius:8px;padding:10px;font-size:13px;color:#1a2332;line-height:1.7;white-space:pre-wrap}
/* calc cards */
.calc-card{border-radius:10px;padding:12px;margin-bottom:12px}
.cc-blue{background:rgba(0,119,204,.07);border:1px solid rgba(0,119,204,.25)}
.cc-amber{background:rgba(204,119,0,.07);border:1px solid rgba(204,119,0,.25)}
.cc-purple{background:rgba(102,68,170,.07);border:1px solid rgba(102,68,170,.25)}
.cc-title{font-family:'B612 Mono',monospace;font-size:10px;text-transform:uppercase;letter-spacing:.1em;margin-bottom:9px}
.cv{font-family:'B612 Mono',monospace;font-size:17px;font-weight:700;color:#38bdf8}
.cv-sub{font-size:10px;color:var(--mut);margin-top:1px}
/* checklist */
.cli{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:8px;border:1px solid;transition:all .15s}
.cli.done{background:rgba(10,138,74,.08);border-color:rgba(10,138,74,.3)}
.cli.undone{background:rgba(232,237,242,.8);border-color:var(--bdr)}
.cli-chk{width:16px;height:16px;border-radius:4px;border:2px solid;flex-shrink:0;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s}
.cli-chk.on{background:var(--em);border-color:var(--em)}
.cli-chk.off{border-color:var(--mut)}.cli-chk.off:hover{border-color:var(--em)}
.cli-num{font-family:'B612 Mono',monospace;font-size:10px;color:var(--mut);min-width:16px}
.cli-text{flex:1;font-size:13px}.cli-text.done{text-decoration:line-through;color:var(--mut)}
.cli-del{opacity:0;font-size:11px;color:var(--mut);transition:opacity .15s;padding:2px 4px;border-radius:3px;border:none;background:none;cursor:pointer}
.cli:hover .cli-del{opacity:1}.cli-del:hover{color:var(--ros)}
.prog{height:3px;background:var(--bdr);border-radius:2px;margin-top:6px;overflow:hidden}
.prog-fill{height:100%;background:var(--em);border-radius:2px;transition:width .3s}
/* filter chips */
.fbar{display:flex;gap:3px;flex-wrap:wrap}
.fchip{font-family:'B612 Mono',monospace;font-size:10px;padding:3px 7px;border-radius:4px;border:1px solid var(--bdr);background:var(--card);color:var(--mut);cursor:pointer;transition:all .15s}
.fchip.on{background:var(--sky);border-color:var(--sky);color:#fff}
.fchip:hover:not(.on){color:var(--txt)}
/* modal */
.overlay{position:fixed;inset:0;background:rgba(100,130,160,.5);backdrop-filter:blur(8px);z-index:100;display:flex;align-items:center;justify-content:center;padding:12px}
.mbox{background:#ffffff;border:1px solid var(--bdr);border-radius:16px;width:100%;max-width:560px;max-height:92vh;display:flex;flex-direction:column;box-shadow:0 30px 60px rgba(0,0,0,.7)}
.mbox.wide{max-width:800px}
/* modal inner tabs */
.mtabs{display:flex;gap:0;border-bottom:1px solid var(--bdr);flex-shrink:0;padding:0 16px}
.mtab{padding:10px 14px;font-size:12px;font-weight:500;color:var(--mut);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .15s;background:none;border-left:none;border-right:none;border-top:none}
.mtab.on{color:#38bdf8;border-bottom-color:var(--sky)}
.mtab:hover:not(.on){color:var(--txt)}
.mtab-panel{display:none;padding:16px;overflow-y:auto;flex:1}
.mtab-panel.on{display:block}
.mhead{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:1px solid var(--bdr);flex-shrink:0}
.mtitle{font-family:'Syne',sans-serif;font-weight:700;color:#fff;font-size:15px}
.mclose{background:none;border:none;color:var(--mut);font-size:20px;line-height:1;padding:2px 6px;cursor:pointer}.mclose:hover{color:#fff}
.mfoot{padding:10px 16px;border-top:1px solid var(--bdr);display:flex;gap:6px;flex-shrink:0}
/* fuel pair */
.fuel-pair{display:flex;gap:6px;align-items:center}
.fuel-pair-unit{position:relative;flex:1}
.fuel-pair-unit input{padding-right:36px}
.fuel-pair-lbl{position:absolute;right:8px;top:50%;transform:translateY(-50%);font-size:10px;color:var(--mut);pointer-events:none;font-family:'B612 Mono',monospace}
.fuel-pair-eq{color:var(--mut);font-size:13px;flex-shrink:0}
/* toast */
.toast{position:fixed;bottom:18px;right:18px;background:#ffffff;border:1px solid var(--em);border-radius:9px;padding:8px 14px;font-size:12px;color:#0a8a4a;z-index:300;transform:translateY(80px);opacity:0;transition:all .3s;pointer-events:none}
.toast.show{transform:translateY(0);opacity:1}
@media(max-width:640px){
  .panes{flex-direction:column}.sidebar{width:100%;max-height:190px}
  .g2,.g3,.g4{grid-template-columns:1fr}
}
</style>
</head>
<body>
<div id="app">
<header>
  <div class="hdr">
    <div class="logo">
      <div class="logo-icon">&#9992;</div>
      <span class="logo-name">FlightDeck</span>
    </div>
    <nav id="nav">
      <button class="tb on" data-tab="flights">&#9992; Flights</button>
      <button class="tb" data-tab="checklists">&#10003; Checklists</button>
      <button class="tb" data-tab="lessons">&#128218; Lessons</button>
      <button class="tb" data-tab="references">&#128203; References</button>
    </nav>
    <button class="btn btn-g" id="settings-btn" style="font-size:11px;padding:4px 9px;flex-shrink:0">&#9881; Settings</button>
    <button class="pwa-btn" id="install-btn">&#8595; Install</button>
  </div>
</header>
<main>
  <div class="panel on" id="tab-flights">
    <div class="stat-row" id="fl-stats"></div>
    <div class="panes">
      <div class="sidebar">
        <input class="inp" id="fl-search" placeholder="Search flights..." style="font-size:12px"/>
        <div class="fbar" id="fl-filter"></div>
        <div class="slist" id="fl-list"></div>
        <button class="btn btn-p btn-full" id="fl-new">+ Log Flight</button>
        <button class="btn btn-g btn-full" id="fl-export-all">&#8595; Export All (.csv)</button>
      </div>
      <div class="detail" id="fl-detail">
        <div class="empty"><div class="empty-icon">&#9992;</div><span>Select a flight or log a new one</span></div>
      </div>
    </div>
  </div>
  <div class="panel" id="tab-checklists">
    <div class="panes">
      <div class="sidebar">
        <div class="fbar" id="cl-filter"></div>
        <div class="slist" id="cl-list"></div>
        <button class="btn btn-p btn-full" id="cl-new">+ New Checklist</button>
      </div>
      <div class="detail" id="cl-detail">
        <div class="empty"><div class="empty-icon">&#10003;</div><span>Select a checklist</span></div>
      </div>
    </div>
  </div>
  <div class="panel" id="tab-lessons">
    <div class="panes">
      <div class="sidebar">
        <div class="fbar" id="ls-filter"></div>
        <div class="slist" id="ls-list"></div>
        <button class="btn btn-p btn-full" id="ls-new">+ New Lesson Plan</button>
      </div>
      <div class="detail" id="ls-detail">
        <div class="empty"><div class="empty-icon">&#128218;</div><span>Select a lesson</span></div>
      </div>
    </div>
  </div>
  <div class="panel" id="tab-references">
    <div class="panes">
      <div class="sidebar">
        <input class="inp" id="rf-search" placeholder="Search..." style="font-size:12px"/>
        <div class="fbar" id="rf-filter"></div>
        <div class="slist" id="rf-list"></div>
        <button class="btn btn-p btn-full" id="rf-new">+ New Reference</button>
      </div>
      <div class="detail" id="rf-detail">
        <div class="empty"><div class="empty-icon">&#128203;</div><span>Select a reference</span></div>
      </div>
    </div>
  </div>
</main>
</div>
<div id="modal-root"></div>
<div class="toast" id="toast"></div>
<script>
'use strict';
// ============================================================
// UTILITIES
// ============================================================
var USG_TO_L = 3.785;
var uid = function(){ return Math.random().toString(36).slice(2,9); };
var qs  = function(s,c){ return (c||document).querySelector(s); };
function save(k,v){ try{ localStorage.setItem(k,JSON.stringify(v)); }catch(e){} }
function load(k,d){ try{ var r=localStorage.getItem(k); return r?JSON.parse(r):d; }catch(e){ return d; } }
function toast(msg){ var t=qs('#toast'); t.textContent=msg; t.classList.add('show'); setTimeout(function(){ t.classList.remove('show'); },2500); }
function dlFile(name,text,mime){ var a=document.createElement('a'); a.href='data:'+(mime||'text/plain')+';charset=utf-8,'+encodeURIComponent(text); a.download=name; a.click(); }
function mkEl(tag,cls,html){ var e=document.createElement(tag); if(cls)e.className=cls; if(html)e.innerHTML=html; return e; }
function setText(id,v,ctx){ var e=qs('#'+id,ctx||document); if(e)e.textContent=v; }

// ============================================================
// TIME / INSTRUMENT HELPERS
// ============================================================
function parseUTC(s){ if(!s)return null; var m=s.match(/^(\d{1,2}):(\d{2})$/); if(!m)return null; var h=parseInt(m[1]),mn=parseInt(m[2]); if(h>23||mn>59)return null; return h+mn/60; }
function timeDiff(s,e){ if(s===null||e===null)return null; var d=e-s; if(d<0)d+=24; return d; }
function decToHM(d){ if(d===null||d===undefined||isNaN(d))return '--'; var h=Math.floor(d),m=Math.round((d-h)*60); return h+':'+(m<10?'0':'')+m; }
function dec2(v){ if(v===null||v===undefined||isNaN(parseFloat(v)))return '--'; return parseFloat(v).toFixed(2); }
function instrDiff(s,e){ var sv=parseFloat(s),ev=parseFloat(e); if(isNaN(sv)||isNaN(ev))return null; var d=ev-sv; return d>=0?d:null; }

// ============================================================
// SETTINGS
// ============================================================
var SETTINGS_KEY='fd_settings';
var settings=load(SETTINGS_KEY,{defaultBurnRate:'8.0'});
function saveSettings(){ save(SETTINGS_KEY,settings); }

// ============================================================
// FUEL HELPERS
// ============================================================
function fuelOnBoard(fobUSG,burnRateStr){
  var fob=parseFloat(fobUSG), burn=parseFloat(burnRateStr||settings.defaultBurnRate);
  return { fob:isNaN(fob)?null:fob, litres:isNaN(fob)?null:fob*USG_TO_L, burn:isNaN(burn)?null:burn, endurance:(!isNaN(fob)&&!isNaN(burn)&&burn>0)?fob/burn:null };
}
function fuelRequired(f){
  var burn=parseFloat(f.burnRate||settings.defaultBurnRate);
  var taxi=parseFloat(f.fuelTaxi)||0, trip=parseFloat(f.fuelTrip)||0;
  var contPct=parseFloat(f.fuelContPct)||0, alt=parseFloat(f.fuelAlt)||0;
  var fin=parseFloat(f.fuelFinal)||0, extra=parseFloat(f.fuelExtra)||0;
  var cont=trip*(contPct/100), total=taxi+trip+cont+alt+fin+extra;
  return {burn:burn,taxi:taxi,trip:trip,contPct:contPct,cont:cont,alt:alt,final_:fin,extra:extra,total:total};
}
function flCalc(f){
  return {
    block:timeDiff(parseUTC(f.chocksOff),parseUTC(f.chocksOn)),
    air:timeDiff(parseUTC(f.takeoff),parseUTC(f.landing)),
    tacho:instrDiff(f.tachoStart,f.tachoEnd),
    hobbs:instrDiff(f.hobbsStart,f.hobbsEnd)
  };
}

// ============================================================
// WIND CALCULATIONS
// ============================================================
function rwyWindComp(rwyHdg,windDir,windSpd){
  var r=parseFloat(rwyHdg),d=parseFloat(windDir),s=parseFloat(windSpd);
  if(isNaN(r)||isNaN(d)||isNaN(s)||s<0)return null;
  var angle=(d-r)*Math.PI/180;
  var hw=s*Math.cos(angle), xw=s*Math.sin(angle);
  return{hw:hw,xw:xw,hwAbs:Math.round(Math.abs(hw)),xwAbs:Math.round(Math.abs(xw)),hwLabel:hw>=0?'HW':'TW',xwLabel:xw>=0?'R':'L'};
}
function windComp(dirDeg,spdKt){
  var d=parseFloat(dirDeg),s=parseFloat(spdKt);
  if(isNaN(d)||isNaN(s))return null;
  var rad=d*Math.PI/180;
  return{hw:Math.round(s*Math.cos(rad)),xw:Math.round(Math.abs(s*Math.sin(rad))),raw_xw:s*Math.sin(rad)};
}
function driftAngle(xwKt,tasKt){var x=Math.abs(parseFloat(xwKt)),t=parseFloat(tasKt);if(isNaN(x)||isNaN(t)||t<=0)return null;return Math.asin(Math.min(1,x/t))*180/Math.PI;}
function groundSpeed(tasKt,hwKt,xwKt){var tas=parseFloat(tasKt),hw=parseFloat(hwKt),xw=parseFloat(xwKt);if(isNaN(tas)||isNaN(hw)||isNaN(xw))return null;return Math.round(Math.sqrt(Math.max(0,tas*tas-xw*xw))-hw);}
function maxDrift(xwKt,iasKt){return driftAngle(xwKt,iasKt);}

// ============================================================
// METAR/TAF FETCH
// ============================================================
// ============================================================
// MODAL ENGINE
// ============================================================
function openModal(cfg){
  var root=qs('#modal-root'); root.innerHTML='';
  var ov=mkEl('div','overlay');
  var box=mkEl('div',cfg.wide?'mbox wide':'mbox');
  var mh=mkEl('div','mhead');
  mh.innerHTML='<span class="mtitle">'+cfg.title+'</span><button class="mclose">&times;</button>';
  var mb=mkEl('div','mbody');
  if(typeof cfg.body==='string')mb.innerHTML=cfg.body; else mb.appendChild(cfg.body);
  mb.style.cssText='padding:16px;overflow-y:auto;flex:1';
  var mf=mkEl('div','mfoot');
  if(cfg.onSave){ var sb=mkEl('button','btn btn-p',cfg.saveLabel||'Save'); sb.addEventListener('click',function(){if(cfg.onSave()!==false)closeModal();}); mf.appendChild(sb); }
  var cb=mkEl('button','btn btn-g','Cancel'); cb.addEventListener('click',closeModal); mf.appendChild(cb);
  box.appendChild(mh); box.appendChild(mb); box.appendChild(mf);
  ov.appendChild(box); root.appendChild(ov);
  ov.addEventListener('click',function(e){if(e.target===ov)closeModal();});
  qs('.mclose',box).addEventListener('click',closeModal);
  setTimeout(function(){var f=qs('input,textarea',mb);if(f)f.focus();},50);
}
function openTabModal(cfg){
  // Modal with internal tabs
  var root=qs('#modal-root'); root.innerHTML='';
  var ov=mkEl('div','overlay');
  var box=mkEl('div',cfg.wide?'mbox wide':'mbox');
  box.style.display='flex'; box.style.flexDirection='column';
  var mh=mkEl('div','mhead');
  mh.innerHTML='<span class="mtitle">'+cfg.title+'</span><button class="mclose">&times;</button>';
  // tab buttons
  var mtabs=mkEl('div','mtabs');
  cfg.tabs.forEach(function(t,i){
    var btn=mkEl('button','mtab'+(i===0?' on':''),t.label);
    btn.addEventListener('click',function(){
      mtabs.querySelectorAll('.mtab').forEach(function(b){b.classList.remove('on');});
      box.querySelectorAll('.mtab-panel').forEach(function(p){p.classList.remove('on');});
      btn.classList.add('on'); qs('#mtpanel-'+i,box).classList.add('on');
    });
    mtabs.appendChild(btn);
  });
  box.appendChild(mh); box.appendChild(mtabs);
  cfg.tabs.forEach(function(t,i){
    var panel=mkEl('div','mtab-panel'+(i===0?' on':'')); panel.id='mtpanel-'+i;
    if(typeof t.body==='string')panel.innerHTML=t.body; else panel.appendChild(t.body);
    box.appendChild(panel);
  });
  var mf=mkEl('div','mfoot');
  if(cfg.onSave){ var sb=mkEl('button','btn btn-p',cfg.saveLabel||'Save'); sb.addEventListener('click',function(){if(cfg.onSave()!==false)closeModal();}); mf.appendChild(sb); }
  var cb=mkEl('button','btn btn-g','Cancel'); cb.addEventListener('click',closeModal); mf.appendChild(cb);
  box.appendChild(mf);
  ov.appendChild(box); root.appendChild(ov);
  ov.addEventListener('click',function(e){if(e.target===ov)closeModal();});
  qs('.mclose',box).addEventListener('click',closeModal);
  setTimeout(function(){var f=qs('input,textarea',box);if(f)f.focus();},50);
  return box;
}

function timeSpinnerHtml(baseId,stored){
  var h='',m='';
  if(stored&&stored.match(/^\d{1,2}:\d{2}$/)){ var p=stored.split(':'); h=parseInt(p[0]).toString(); m=p[1]; }
  var ho='<option value="">HH</option>';
  for(var i=0;i<24;i++){var v=('0'+i).slice(-2);ho+='<option value="'+v+'"'+(h===String(i)?' selected':'')+'>'+v+'</option>';}
  var mo='<option value="">MM</option>';

  return '<div style="display:flex;gap:4px;align-items:center"><select class="inp" id="'+baseId+'-h" style="flex:1">'+ho+'</select><span style="color:var(--mut);font-weight:bold">:</span><select class="inp" id="'+baseId+'-m" style="flex:1">'+mo+'</select></div>';

function getTime(baseId,ctx){ var h=qs('#'+baseId+'-h',ctx), m=qs('#'+baseId+'-m',ctx); return (h&&m&&h.value&&m.value)?h.value+':'+m.value:''; }

function dateDropdowns(stored){
  var yr_v='',mo_v='',dy_v='';
  if(stored){var p=stored.split('-');if(p.length===3){yr_v=p[0];mo_v=p[1];dy_v=p[2];}}
  var dy='<select class="inp" id="m-day" style="flex:1"><option value="">DD</option>';
  for(var d=1;d<=31;d++){var v=('0'+d).slice(-2);dy+='<option value="'+v+'"'+(dy_v===v?' selected':'')+'>'+v+'</option>';}
  dy+='</select>';
  var months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  var mo='<select class="inp" id="m-month" style="flex:1.5"><option value="">MMM</option>';
  months.forEach(function(mn,i){var v=('0'+(i+1)).slice(-2);mo+='<option value="'+v+'"'+(mo_v===v?' selected':'')+'>'+mn+'</option>';});
  mo+='</select>';
  var now=new Date().getFullYear();
  var yr='<select class="inp" id="m-year" style="flex:1.3"><option value="">YYYY</option>';
  for(var y=now;y>=now-5;y--){yr+='<option value="'+y+'"'+(yr_v===String(y)?' selected':'')+'>'+y+'</option>';}
  yr+='</select>';
  return '<div style="display:flex;gap:5px">'+dy+mo+yr+'</div>';
}

// ── Flight Modal ──────────────────────────────────────────
// Filter a multi-line METAR string to only observations within
// ±30 min of the flight window (chocksOff -> chocksOn, HH:MM UTC)
// METAR timestamp format: ICAO DDHHMMz e.g. EGLL 071220Z
function filterMetarsByFlight(metarText, chocksOff, chocksOn){
  if(!metarText || !chocksOff) return metarText;

  var offDec  = parseUTC(chocksOff);
  var onDec   = parseUTC(chocksOn || chocksOff);
  if(offDec === null) return metarText;

  // Window: 30 min before chocks off to 30 min after chocks on
  var MARGIN = 0.5; // 0.5 hrs = 30 min
  var winStart = offDec - MARGIN;
  var winEnd   = onDec  + MARGIN;
  // Handle midnight wrap
  if(winStart < 0)  winStart += 24;
  if(winEnd   > 24) winEnd   -= 24;

  var lines = metarText.split('\n');
  var filtered = lines.filter(function(line){
    // Extract time from METAR: second token is DDHHMMz or HHMMz
    var parts = line.trim().split(/\s+/);
    var tok = parts.length > 1 ? parts[1] : '';
    // Match DDHHMMz (6 digits + Z) or HHMMz (4 digits + Z)
    var m6 = tok.match(/^\d{2}(\d{2})(\d{2})[Zz]/);  // DDHHMMz
    var m4 = tok.match(/^(\d{2})(\d{2})[Zz]/);        // HHMMz
    var metarH = null;
    if(m6) metarH = parseInt(m6[1]) + parseInt(m6[2])/60;
    else if(m4) metarH = parseInt(m4[1]) + parseInt(m4[2])/60;
    if(metarH === null) return true; // can't parse time - keep it

    // Check if within window (accounting for midnight wrap)
    if(winStart <= winEnd){
      return metarH >= winStart && metarH <= winEnd;
    } else {
      // Wraps midnight
      return metarH >= winStart || metarH <= winEnd;
    }
  });

  return filtered.length > 0 ? filtered.join('\n') : lines[0] || metarText;
}

// Fetch METAR and TAF - tries multiple sources with nearest-station fallback
function fetchWx(icao, cb){

  function parseRaw(txt){
    if(!txt || typeof txt !== 'string') return '';
    return txt.split('\n')
      .map(function(l){ return l.trim(); })
      .filter(function(l){ return l.length > 3 && l.charAt(0) !== '<'; })
      .join('\n');
  }

  var noaaBase = 'https://aviationweather.gov/api/data/';

  // Fetch METAR+TAF directly from NOAA for a given station ID
  function noaaFetch(id, done){
    var m='', t='', n=0;
    function check(){ if(++n===2) done(m, t); }
    fetch(noaaBase+'metar?ids='+id+'&format=raw&hours=6')
      .then(function(r){ return r.text(); })
      .then(function(txt){ m=parseRaw(txt); check(); })
      .catch(function(){ check(); });
    fetch(noaaBase+'taf?ids='+id+'&format=raw')
      .then(function(r){ return r.text(); })
      .then(function(txt){ t=parseRaw(txt); check(); })
      .catch(function(){ check(); });
  }

  // Find nearest station via NOAA airport coords + bbox search
  function findNearest(done){
    fetch(noaaBase+'airport?ids='+icao)
      .then(function(r){ return r.json(); })
      .then(function(d){
        if(!d||!d[0]||d[0].lat==null){ done(null); return; }
        var lat=d[0].lat, lon=d[0].lon, margin=3;
        var bbox=[lat-margin,lon-margin,lat+margin,lon+margin].join(',');
        fetch(noaaBase+'metar?bbox='+bbox+'&format=raw&hours=6')
          .then(function(r){ return r.text(); })
          .then(function(txt){
            var lines=parseRaw(txt).split('\n').filter(function(l){return l.length>8;});
            if(!lines.length){ done(null); return; }
            // Pick closest (first result), extract station ID
            var nearestId = lines[0].split(' ')[0];
            done(nearestId, lines[0]);
          })
          .catch(function(){ done(null); });
      })
      .catch(function(){ done(null); });
  }

  // VATSIM fallback - METAR only
  function tryVatsim(id, done){
    fetch('https://metar.vatsim.net/metar.php?id='+id)
      .then(function(r){ return r.text(); })
      .then(function(txt){ done(parseRaw(txt)); })
      .catch(function(){ done(''); });
  }

  // Step 1: try NOAA direct
  noaaFetch(icao, function(m, t){
    if(m || t){ cb(m, t); return; }

    // Step 2: VATSIM direct
    tryVatsim(icao, function(vm){
      if(vm){ cb(vm, ''); return; }

      // Step 3: Find nearest station via bbox
      findNearest(function(nearId, nearMetar){
        if(!nearId){ cb('No data found for '+icao, ''); return; }

        // Step 4: fetch full data for nearest station
        noaaFetch(nearId, function(nm, nt){
          var prefix = '[Nearest station: '+nearId+'] ';
          if(nm || nt){
            cb(prefix+(nm||nearMetar), nt);
          } else {
            tryVatsim(nearId, function(nvm){
              cb(prefix+(nvm||nearMetar), '');
            });
          }
        });
      });
    });
  });
}

    var tmpF={burnRate:g2('m-burnRate'),fuelTaxi:g2('m-fuelTaxi-usg'),fuelTrip:g2('m-fuelTrip-usg'),fuelContPct:g2('m-fuelContPct'),fuelAlt:g2('m-fuelAlt-usg'),fuelFinal:g2('m-fuelFinal-usg'),fuelExtra:g2('m-fuelExtra-usg')};
    var fr=fuelRequired(tmpF);
    setText('fr-taxi',dec2(fr.taxi)+' USG / '+dec2(fr.taxi*USG_TO_L)+' L',t2);
    setText('fr-trip',dec2(fr.trip)+' USG / '+dec2(fr.trip*USG_TO_L)+' L',t2);
    setText('fr-cont',dec2(fr.cont)+' USG ('+dec2(fr.contPct)+'%)',t2);
    setText('fr-alt',dec2(fr.alt)+' USG / '+dec2(fr.alt*USG_TO_L)+' L',t2);
    setText('fr-final',dec2(fr.final_)+' USG / '+dec2(fr.final_*USG_TO_L)+' L',t2);
    setText('fr-extra',dec2(fr.extra)+' USG / '+dec2(fr.extra*USG_TO_L)+' L',t2);
    setText('fr-total',dec2(fr.total)+' USG / '+dec2(fr.total*USG_TO_L)+' L',t2);
    var te=fob.burn&&fob.burn>0?decToHM(fr.total/fob.burn):'--';
    setText('fr-total-end',te,t2);
    var surplus=fob.fob!==null?fob.fob-fr.total:null;
    var se=qs('#fr-surplus',t2);
    if(se){se.textContent=surplus!==null?(dec2(surplus)+' USG / '+dec2(surplus*USG_TO_L)+' L'):'--';se.style.color=surplus===null?'#94a3b8':surplus>=0?'#6ee7b7':'#fda4af';}
    var see=qs('#fr-surplus-end',t2);
    if(see){see.textContent=surplus!==null&&fob.burn&&fob.burn>0?decToHM(Math.abs(surplus)/fob.burn):'--';see.style.color=surplus===null?'#94a3b8':surplus>=0?'#6ee7b7':'#fda4af';}
  }
  // Fuel pair cross-conversion
  ['m-fob','m-fuelTaxi','m-fuelTrip','m-fuelAlt','m-fuelFinal','m-fuelExtra'].forEach(function(base){
    var u=qs('#'+base+'-usg',t2), l=qs('#'+base+'-l',t2);
    if(!u||!l)return;
    u.addEventListener('input',function(){var v=parseFloat(u.value);l.value=isNaN(v)?'':(v*USG_TO_L).toFixed(2);fuelCalcLive();});
    l.addEventListener('input',function(){var v=parseFloat(l.value);u.value=isNaN(v)?'':(v/USG_TO_L).toFixed(2);fuelCalcLive();});
  });
  var fuelNonPair=['m-burnRate','m-fuelContPct'];
  fuelNonPair.forEach(function(id){var e=qs('#'+id,t2);if(e)e.addEventListener('input',fuelCalcLive);});
  if(ex)setTimeout(fuelCalcLive,0);

  // Times calc live
  function timesCalcLive(){
    var block=timeDiff(parseUTC(getTime('m-chocksOff',t3)),parseUTC(getTime('m-chocksOn',t3)));
    var air=timeDiff(parseUTC(getTime('m-takeoff',t3)),parseUTC(getTime('m-landing',t3)));
    var tacho=instrDiff(qs('#m-tachoStart',t3)?qs('#m-tachoStart',t3).value:'',qs('#m-tachoEnd',t3)?qs('#m-tachoEnd',t3).value:'');
    var hobbs=instrDiff(qs('#m-hobbsStart',t3)?qs('#m-hobbsStart',t3).value:'',qs('#m-hobbsEnd',t3)?qs('#m-hobbsEnd',t3).value:'');
    setText('m-tacho-v',dec2(tacho),t3); setText('m-hobbs-v',dec2(hobbs),t3);
    setText('m-block-v',decToHM(block),t3); setText('m-air-v',decToHM(air),t3);
  }
  ['m-chocksOff','m-chocksOn','m-takeoff','m-landing'].forEach(function(id){
    var h=qs('#'+id+'-h',t3),m=qs('#'+id+'-m',t3);
    if(h)h.addEventListener('change',timesCalcLive);
    if(m)m.addEventListener('change',timesCalcLive);
  });
  ['m-tachoStart','m-tachoEnd','m-hobbsStart','m-hobbsEnd'].forEach(function(id){var e=qs('#'+id,t3);if(e)e.addEventListener('input',timesCalcLive);});
  if(ex)setTimeout(timesCalcLive,0);
}

function exportAllFlights(){

  var hdr='Date,Aircraft,Category,Dep,Dest,PIC,Student,ETOT,SurfWind,2000ftWind,MaxDrift,FreezFL,FOB_USG,FOB_L,Endurance,BurnRate,Taxi,Trip,Cont,Alt,Final,Extra,TotalReq,Surplus,ChocksOff,Takeoff,Landing,ChocksOn,BlockHM,BlockHrs,AirHM,AirHrs,TachoStart,TachoEnd,TachoHrs,HobbsStart,HobbsEnd,HobbsHrs,Oil,FuelUplifted,Maneuvers,Notes';
  var rows=flights.map(function(f){
    var c=flCalc(f); var fob5=fuelOnBoard(f.fob,f.burnRate); var fr5=fuelRequired(f);
    var s5=fob5.fob!==null?fob5.fob-fr5.total:null;
    // wind calcs not needed in export
    return [f.date,f.aircraft,f.category,f.departure,f.destination,f.pic,f.student,
      f.etot,(f.wxSurfDir&&f.wxSurfSpd?f.wxSurfDir+'/'+f.wxSurfSpd+'kt':''),
      (f.wx2000Dir&&f.wx2000Spd?f.wx2000Dir+'/'+f.wx2000Spd+'kt':''),(f.wxFreezFL||''),
      dec2(fob5.fob),dec2(fob5.litres),dec2(fob5.endurance),fob5.burn,
      dec2(fr5.taxi),dec2(fr5.trip),dec2(fr5.cont),dec2(fr5.alt),dec2(fr5.final_),dec2(fr5.extra),dec2(fr5.total),dec2(s5),
      f.chocksOff,f.takeoff,f.landing,f.chocksOn,
      decToHM(c.block),dec2(c.block),decToHM(c.air),dec2(c.air),
      f.tachoStart,f.tachoEnd,dec2(c.tacho),f.hobbsStart,f.hobbsEnd,dec2(c.hobbs),
      f.oil,f.fuelUplifted,
      '"'+(f.maneuvers||'').replace(/"/g,'""')+'"','"'+(f.notes||'').replace(/"/g,'""')+'"'
    ].join(',');
  });
  dlFile('FlightDeck_log.csv',[hdr].concat(rows).join('\n'),'text/csv');

}

function openRfModal(ex){var rf=ex||{id:uid(),title:'',category:'Regulations',content:''};var div=document.createElement('div');div.innerHTML=field('Title',inp('m-rft','text','Reference title',rf.title))+field('Category',sel('m-rfc',RF_CATS,rf.category))+field('Content',ta('m-rfc2',10,rf.content,''));openModal({title:ex?'Edit Reference':'New Reference',body:div,wide:false,saveLabel:ex?'Save':'Create',onSave:function(){rf.title=qs('#m-rft',div).value.trim();if(!rf.title)return false;rf.category=qs('#m-rfc',div).value;rf.content=qs('#m-rfc2',div).value;if(!ex)refs.push(rf);else{var i=refs.findIndex(function(x){return x.id===rf.id;});if(i>=0)refs[i]=rf;}rfSave();rfActive=rf.id;renderRfList();renderRfDetail();toast(ex?'Updated':'Created');}});}

// Unregister any old service workers that may be serving stale cached files
if('serviceWorker' in navigator){
  navigator.serviceWorker.getRegistrations().then(function(regs){
    regs.forEach(function(r){ r.unregister(); });
  });
  // Clear all caches
  if(window.caches){
    caches.keys().then(function(keys){
      keys.forEach(function(k){ caches.delete(k); });
    });
  }
}
